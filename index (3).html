  <!-- API Key Gate (shown before app loads) -->
  <div id="api-gate">
    <div class="box">
      <h1>CREATOR OS</h1>
      <p>Enter your Anthropic API key to power the AI agents.<br/>Your key stays in this browser tab — never sent anywhere else.</p>
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" />
      <button onclick="startApp()">LAUNCH →</button>
      <p class="note">
        Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br/>
        Key is stored in memory only — cleared when you close the tab.
      </p>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // Global API key — set by the gate, read by fetch calls inside the app
    window.__ANTHROPIC_KEY = "";

    function startApp() {
      const key = document.getElementById("api-key-input").value.trim();
      if (!key.startsWith("sk-ant")) {
        document.getElementById("api-key-input").style.borderColor = "#FF3A3A";
        return;
      }
      window.__ANTHROPIC_KEY = key;
      document.getElementById("api-gate").style.display = "none";
    }

    // Allow Enter key to submit
    document.getElementById("api-key-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") startApp();
    });
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // Patch fetch calls to inject the API key header automatically
    const _origFetch = window.fetch;
    window.fetch = function(url, opts = {}) {
      if (typeof url === "string" && url.includes("api.anthropic.com")) {
        opts.headers = {
          ...(opts.headers || {}),
          "x-api-key": window.__ANTHROPIC_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        };
      }
      return _origFetch(url, opts);
    };

function Sparkline({ data, color, w=100, h=34 }) {
  const max=Math.max(...data), min=Math.min(...data), rng=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*h}`).join(" ");
  return <svg width={w} height={h} style={{overflow:"visible",display:"block"}}><polyline fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" points={pts}/></svg>;
}

function ProgressRing({ pct, size=64, stroke=5, color="#00ff88" }) {
  const r=(size-stroke)/2, circ=2*Math.PI*r, off=circ-(pct/100)*circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        style={{transition:"stroke-dashoffset .6s ease"}}/>
    </svg>
  );
}

function Badge({ platform }) {
  const p = PLATFORMS[platform];
  return <span style={{fontSize:9,padding:"2px 7px",borderRadius:3,background:p.bg,color:p.color,border:`1px solid ${p.color}33`,fontFamily:"'Share Tech Mono', monospace"}}>{p.name.toUpperCase()}</span>;
}

function Typewriter({ text, speed=4 }) {
  const [s, setS] = useState(""), [done, setDone] = useState(false), i = useRef(0);
  useEffect(()=>{ setS(""); setDone(false); i.current=0; if(!text)return;
    const iv=setInterval(()=>{ if(i.current<text.length) setS(text.slice(0,++i.current)); else{setDone(true);clearInterval(iv);} },speed);
    return()=>clearInterval(iv); },[text]);
  return <span>{s}{!done&&<span style={{animation:"blink .7s infinite"}}>▊</span>}</span>;
}

function CopyBtn({ text, small }) {
  const [c,setC]=useState(false);
  return <button onClick={()=>{navigator.clipboard.writeText(text);setC(true);setTimeout(()=>setC(false),2000)}}
    style={{background:c?"rgba(0,255,136,0.1)":"rgba(255,255,255,0.04)",border:`1px solid ${c?"rgba(0,255,136,0.25)":"rgba(255,255,255,0.08)"}`,
      color:c?"#00ff88":"#555",padding:small?"2px 8px":"4px 11px",borderRadius:5,
      fontSize:small?8:9,fontFamily:"'Share Tech Mono', monospace",cursor:"pointer",transition:"all .2s"}}>
    {c?"✓ COPIED":"COPY"}
  </button>;
}

                  <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:16,color:"#A78BFA"}}>CUSTOM AGENT</div>
                  <div style={{fontSize:8,color:"#555",fontFamily:"'Share Tech Mono', monospace"}}>Define any Claude persona & task</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"44px 1fr 120px",gap:7}}>
                <input value={customState.emoji} onChange={e=>setCustomState(s=>({...s,emoji:e.target.value}))} style={{...INP,textAlign:"center",fontSize:18,padding:"7px 4px"}}/>
                <input value={customState.name} onChange={e=>setCustomState(s=>({...s,name:e.target.value}))} placeholder="Agent name…" style={INP}/>
                <select value={customState.platform} onChange={e=>setCustomState(s=>({...s,platform:e.target.value}))} style={{...INP,cursor:"pointer"}}>
                  {Object.entries(PLATFORMS).map(([k,v])=><option key={k} value={k} style={{background:"#111"}}>{v.name}</option>)}
                </select>
              </div>
              <textarea value={customState.system} onChange={e=>setCustomState(s=>({...s,system:e.target.value}))} rows={2}
                placeholder="System prompt — define persona, expertise, output format…" style={{...INP,resize:"vertical",lineHeight:1.6}}/>
              <div style={{display:"flex",gap:7}}>
                <textarea value={customState.task} onChange={e=>setCustomState(s=>({...s,task:e.target.value}))} rows={2}
                  placeholder="Task — what should this agent do right now?" style={{...INP,flex:1,resize:"none",lineHeight:1.6}}/>
                <button onClick={()=>{
                  if(!customState.name||!customState.system||!customState.task) return;
                  runAgent({id:"custom-"+Date.now(),name:customState.name,emoji:customState.emoji,platform:customState.platform,
                    systemPrompt:customState.system,userPromptTemplate:()=>customState.task,outputType:"custom",description:"Custom"}, customState.task);
                }} style={{padding:"0 16px",background:"linear-gradient(135deg,#A78BFA,#7C3AED)",border:"none",borderRadius:7,color:"#fff",
                  fontFamily:"'Share Tech Mono', monospace",fontSize:11,fontWeight:700,cursor:"pointer"}}>▶</button>
              </div>
            </div>
          </div>
        )}

        {agentTab==="history"&&(
          <div>
            {agentResults.length===0
              ? <div style={{textAlign:"center",padding:"60px 0",color:"#2a2a2a",fontFamily:"'Share Tech Mono', monospace",fontSize:11}}>No results yet.</div>
              : <>
                  <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
                    <button onClick={()=>setAgentResults([])} style={{background:"none",border:"1px solid rgba(255,68,68,0.2)",color:"#ff4444",padding:"4px 10px",borderRadius:5,fontSize:9,fontFamily:"'Share Tech Mono', monospace",cursor:"pointer"}}>CLEAR ALL</button>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>
                    {agentResults.map(r=><OutputCard key={r.id} r={r}/>)}
                  </div>
                </>}
          </div>
        )}
      </div>

      {/* Feed panel */}
      <div style={{background:"rgba(0,0,0,0.2)",borderRadius:12,padding:18,overflowY:"auto",borderLeft:"1px solid rgba(255,255,255,0.05)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:8,color:"#2a2a2a",letterSpacing:2,fontFamily:"'Share Tech Mono', monospace"}}>LIVE OUTPUT FEED</div>
          {agentResults.length>0&&<div style={{fontSize:7,color:"#A78BFA",fontFamily:"'Share Tech Mono',monospace"}}>All saved to Vault ↗</div>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[["RUNS",agentResults.length,"#A78BFA"],["ACTIVE",runningAgents.size,"#00ff88"]].map(([l,v,c])=>(
            <div key={l} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:7,padding:"10px 12px"}}>
              <div style={{fontSize:7,color:"#2a2a2a",letterSpacing:2,fontFamily:"'Share Tech Mono', monospace"}}>{l}</div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:22,color:c}}>{v}</div>
            </div>
          ))}
        </div>
        {agentResults.length===0
          ? <div style={{textAlign:"center",padding:"40px 0"}}>
              <div style={{fontSize:32,opacity:.1,marginBottom:10}}>🤖</div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:16,color:"#1a1a1a",letterSpacing:2}}>AWAITING COMMANDS</div>
              <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:6}}>
                {["Why Diamond players never reach Top 500","Ash operator guide — what elites do differently","Arc Raiders survival tips from an FPS veteran"].map(ex=>(
                  <div key={ex} style={{padding:"7px 10px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",borderRadius:6,fontSize:9,color:"#2a2a2a",fontFamily:"'Share Tech Mono', monospace",fontStyle:"italic"}}>"{ex}"</div>
                ))}
              </div>
            </div>
          : <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {agentResults.slice(0,5).map(r=><OutputCard key={r.id} r={r} defaultOpen={agentResults.indexOf(r)===0}/>)}
            </div>}
      </div>
    </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAGE: AUTOPILOT
// ═══════════════════════════════════════════════════════════════════════════════

function PageAutopilot({ niche, setNiche, nicheSet, setNicheSet, autopilotRunning, startAutopilot, stopAutopilot,
  activeJobs, setActiveJobs, queue, setQueue, totalGenerated, daysPassed, currentWeek, callAutopilotClaude }) {
  const [subTab, setSubTab] = useState("agents");
  const wkIdx    = Math.min(currentWeek - 1, WEEK_GOALS.length - 1);
  const weekGoal = WEEK_GOALS[wkIdx] || WEEK_GOALS[0];
  const readyCount  = queue.filter(i => i.status === "ready").length;
  const genCount    = queue.filter(i => i.status === "generating").length;
  const failCount   = queue.filter(i => i.status === "failed").length;
  const sprintPct   = Math.min(Math.round((daysPassed / 91) * 100), 100);
  const activeCount = [...activeJobs].length;

  const Tab = ({ id, label, badge }) => (
    <button onClick={() => setSubTab(id)} style={{
      padding: "10px 18px", background: "none", border: "none", cursor: "pointer",
      borderBottom: `2px solid ${subTab === id ? "#00F2EA" : "transparent"}`,
      color: subTab === id ? "#fff" : "#333", fontSize: 10,
      fontFamily: "'Share Tech Mono',monospace", letterSpacing: .5,
      transition: "all .2s", whiteSpace: "nowrap"
    }}>
      {label}
      {badge > 0 && <span style={{
        marginLeft: 6, background: subTab === id ? "#00F2EA" : "rgba(255,255,255,0.07)",
        color: subTab === id ? "#000" : "#444", fontSize: 7, padding: "1px 6px",
        borderRadius: 8, fontFamily: "'Orbitron',sans-serif", fontWeight: 700
      }}>{badge}</span>}
    </button>
  );

  return (
    <div style={{ animation: "fadeIn .25s ease" }}>

      {/* ── MAIN STATUS HERO ── */}
      <div style={{
        background: autopilotRunning
          ? "linear-gradient(135deg,rgba(0,255,136,0.07),rgba(0,200,255,0.04))"
          : "rgba(255,255,255,0.02)",
        border: `1px solid ${autopilotRunning ? "rgba(0,255,136,0.22)" : "rgba(255,255,255,0.07)"}`,
        borderRadius: 14, padding: "20px 24px", marginBottom: 16,
        transition: "all .5s", position: "relative", overflow: "hidden"
      }}>
        {autopilotRunning && (
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2,
            background: "linear-gradient(90deg,#00ff88,#00c8ff,#A78BFA,#00ff88)",
            backgroundSize: "200% 100%", animation: "shimmer 3s linear infinite" }} />
        )}

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            {/* Status pill */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{
                width: 10, height: 10, borderRadius: "50%", flexShrink: 0,
                background: autopilotRunning ? "#00ff88" : "#1a1a1a",
                boxShadow: autopilotRunning ? "0 0 10px #00ff88, 0 0 20px rgba(0,255,136,0.3)" : "none",
                animation: autopilotRunning ? "pulse 1.2s infinite" : "none", transition: "all .4s"
              }} />
              <span style={{ fontFamily: "'Orbitron',sans-serif", fontWeight: 800, fontSize: 10, letterSpacing: 2,
                color: autopilotRunning ? "#00ff88" : "#2a2a2a" }}>
                {autopilotRunning ? "AUTOPILOT RUNNING" : "AUTOPILOT IDLE"}
              </span>
              {genCount > 0 && (
                <span style={{ fontSize: 8, padding: "2px 8px", borderRadius: 4,
                  background: "rgba(0,200,255,0.1)", color: "#00c8ff", fontFamily: "'Share Tech Mono',monospace" }}>
                  {genCount} WRITING NOW
                </span>
              )}
            </div>

            {/* Niche */}
            <div style={{ fontFamily: "'Orbitron',sans-serif", fontWeight: 800, fontSize: 17, color: "#fff",
              marginBottom: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {niche}
            </div>
            <div style={{ fontSize: 9, color: "#333", fontFamily: "'Share Tech Mono',monospace" }}>
              {activeCount} of {AUTOPILOT_JOBS.length} agents enabled · {readyCount} scripts ready · {totalGenerated} generated total
            </div>
          </div>

          {/* Mini counters + CTA */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
            {[
              { l: "READY",  v: readyCount,           c: "#00ff88" },
              { l: "WEEK",   v: `${currentWeek}/13`,  c: "#A78BFA" },
              { l: "DAY",    v: `${daysPassed}/91`,   c: "#00c8ff" },
            ].map(s => (
              <div key={s.l} style={{ textAlign: "center", padding: "8px 12px",
                background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 8 }}>
                <div style={{ fontFamily: "'Orbitron',sans-serif", fontWeight: 800, fontSize: 15, color: s.c }}>{s.v}</div>
                <div style={{ fontSize: 6, color: "#2a2a2a", letterSpacing: 2, fontFamily: "'Share Tech Mono',monospace", marginTop: 2 }}>{s.l}</div>
              </div>
            ))}
            <button onClick={autopilotRunning ? stopAutopilot : startAutopilot} style={{
              padding: "14px 26px",
              background: autopilotRunning ? "rgba(255,68,68,0.1)" : "linear-gradient(135deg,#00ff88,#00c8ff)",
              border: autopilotRunning ? "1px solid rgba(255,68,68,0.3)" : "none",
              borderRadius: 10, cursor: "pointer", transition: "all .3s",
              fontFamily: "'Orbitron',sans-serif", fontWeight: 800, fontSize: 12,
              color: autopilotRunning ? "#ff4444" : "#000",
              boxShadow: autopilotRunning ? "none" : "0 0 20px rgba(0,255,136,0.2)"
            }}>
              {autopilotRunning ? "⏹ STOP" : "⚡ START"}
            </button>
          </div>
        </div>

        {/* Sprint bar */}
        <div style={{ marginTop: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
            <span style={{ fontSize: 7, color: "#2a2a2a", letterSpacing: 2, fontFamily: "'Share Tech Mono',monospace" }}>
              WEEK {currentWeek}/13 · {weekGoal.focus.toUpperCase()} · SEE SPRINT TAB FOR DETAILS
            </span>
            <span style={{ fontSize: 8, color: sprintPct > 0 ? "#A78BFA" : "#2a2a2a",
              fontFamily: "'Share Tech Mono',monospace" }}>{sprintPct}% of 91 days</span>
          </div>
          <div style={{ height: 4, background: "rgba(255,255,255,0.04)", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${Math.max(sprintPct, 0.3)}%`, borderRadius: 2,
              background: "linear-gradient(90deg,#A78BFA,#00F2EA,#00ff88)", transition: "width .8s ease" }} />
          </div>
        </div>
      </div>

      {/* ── HOW IT WORKS (only when idle) ── */}
      {!autopilotRunning && (
        <div style={{ background: "rgba(0,200,255,0.04)", border: "1px solid rgba(0,200,255,0.12)",
          borderRadius: 11, padding: "16px 20px", marginBottom: 16 }}>
          <div style={{ fontSize: 8, color: "#00c8ff", letterSpacing: 2,
            fontFamily: "'Share Tech Mono',monospace", marginBottom: 12 }}>HOW IT WORKS — READ THIS ONCE</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 8, marginBottom: 12 }}>
            {[
              ["1", "Hit START", "That's literally it. All agents below are already on."],
              ["2", "Claude writes", "Each agent sends a real API request and writes a script, hook batch, or title pack."],
              ["3", "One at a time", "Agents run one-by-one, 6 seconds apart. No burst = no errors."],
              ["4", "Check Queue", "Finished scripts appear in the Queue tab. Read, copy, use."],
              ["5", "Record & post", "Copy the script, record your video, post it. That's the whole loop."],
            ].map(([n, t, d]) => (
              <div key={n} style={{ background: "rgba(255,255,255,0.02)", borderRadius: 9, padding: "12px 14px" }}>
                <div style={{ fontFamily: "'Orbitron',sans-serif", fontWeight: 800, fontSize: 20,
                  color: "#00c8ff", marginBottom: 6 }}>{n}</div>
                <div style={{ fontSize: 10, color: "#ccc", fontFamily: "'Share Tech Mono',monospace",
                  fontWeight: 600, marginBottom: 4 }}>{t}</div>
                <div style={{ fontSize: 8, color: "#3a3a3a", fontFamily: "'Share Tech Mono',monospace",
                  lineHeight: 1.6 }}>{d}</div>
              </div>
            ))}
          </div>
          <div style={{ padding: "10px 14px", background: "rgba(0,255,136,0.04)", borderRadius: 8,
            fontSize: 9, color: "#444", fontFamily: "'Share Tech Mono',monospace", lineHeight: 1.8 }}>
            <span style={{ color: "#00ff88" }}>Do the toggles matter?</span> Yes — only enabled agents run. They're all ON by default. If you want fewer scripts, toggle some off before hitting START. You can also click <span style={{ color: "#fff" }}>RUN ONCE</span> on any agent to test it individually without starting full autopilot.
          </div>
        </div>
      )}

      {/* ── TABS ── */}
      <div style={{ display: "flex", borderBottom: "1px solid rgba(255,255,255,0.06)", marginBottom: 20 }}>
        <Tab id="agents"   label="⚡ Agents"  badge={activeCount} />
        <Tab id="queue"    label="📥 Queue"   badge={queue.length} />
        <Tab id="sprint"   label="🗓 Sprint" />
        <Tab id="schedule" label="📅 Schedule" />
      </div>

      {/* ════════════════════════════════════
          AGENTS TAB
      ════════════════════════════════════ */}
      {subTab === "agents" && (
        <div>
          {/* Quick summary of what all 10 do */}
          <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)",
            borderRadius: 10, padding: "14px 18px", marginBottom: 16 }}>
            <div style={{ fontSize: 7, color: "#333", letterSpacing: 2,
              fontFamily: "'Share Tech Mono',monospace", marginBottom: 10 }}>
              10 AGENTS · ALL SIEGE / ARC RAIDERS · OUTPUTS GO STRAIGHT TO YOUR VAULT
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10 }}>
              {AUTOPILOT_JOBS.map(j => (
                <div key={j.id} style={{ display: "flex", alignItems: "flex-start", gap: 7,
                  opacity: activeJobs.has(j.id) ? 1 : 0.3, transition: "opacity .2s" }}>
                  <span style={{ fontSize: 16, flexShrink: 0 }}>{j.emoji}</span>
                  <div>
                    <div style={{ fontSize: 9, color: "#999", fontFamily: "'Share Tech Mono',monospace",
                      fontWeight: 600, lineHeight: 1.3 }}>{j.name}</div>
                    <div style={{ fontSize: 7, color: "#2a2a2a", fontFamily: "'Share Tech Mono',monospace",
                      marginTop: 1 }}>{j.schedule}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Bulk controls */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
            <button onClick={() => setActiveJobs(new Set(AUTOPILOT_JOBS.map(j => j.id)))}
              style={{ padding: "6px 14px", background: "rgba(0,255,136,0.08)",
                border: "1px solid rgba(0,255,136,0.2)", borderRadius: 7, color: "#00ff88",
                fontSize: 8, fontFamily: "'Share Tech Mono',monospace", cursor: "pointer" }}>
              ENABLE ALL
            </button>
            <button onClick={() => setActiveJobs(new Set())}
              style={{ padding: "6px 14px", background: "rgba(255,68,68,0.06)",
                border: "1px solid rgba(255,68,68,0.15)", borderRadius: 7, color: "#ff4444",
                fontSize: 8, fontFamily: "'Share Tech Mono',monospace", cursor: "pointer" }}>
              DISABLE ALL
            </button>
            <span style={{ marginLeft: "auto", fontSize: 8, color: "#2a2a2a",
              fontFamily: "'Share Tech Mono',monospace" }}>
              {activeCount}/{AUTOPILOT_JOBS.length} enabled · runs one at a time · 6s gap between calls
            </span>
          </div>

          {/* Agent cards — grouped by platform */}
          {Object.entries(
            AUTOPILOT_JOBS.reduce((acc, j) => { (acc[j.platform] = acc[j.platform] || []).push(j); return acc; }, {})
          ).map(([platform, jobs]) => {
            const p = PLATFORMS[platform] || PLATFORMS.all;
            return (
              <div key={platform} style={{ marginBottom: 22 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10,
                  paddingBottom: 7, borderBottom: `1px solid ${p.color}18` }}>
                  <span style={{ color: p.color }}>{p.icon}</span>
                  <span style={{ fontFamily: "'Orbitron',sans-serif", fontWeight: 800,
                    fontSize: 12, color: p.color, letterSpacing: 1 }}>{p.name.toUpperCase()}</span>
                  <span style={{ fontSize: 7, color: "#2a2a2a", fontFamily: "'Share Tech Mono',monospace" }}>
                    {jobs.filter(j => activeJobs.has(j.id)).length}/{jobs.length} active
                  </span>
                  <div style={{ flex: 1, height: 1,
                    background: `linear-gradient(90deg,${p.color}15,transparent)` }} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }}>
                  {jobs.map(job => {
                    const on     = activeJobs.has(job.id);
                    const isGen  = queue.some(q => q.id.startsWith(job.id) && q.status === "generating");
                    const nReady = queue.filter(q => q.id.startsWith(job.id) && q.status === "ready").length;
                    return (
                      <div key={job.id} style={{
                        background: on ? `linear-gradient(135deg,${p.color}09,rgba(6,8,13,0.85))` : "rgba(255,255,255,0.015)",
                        border: `1px solid ${on ? p.color + "2a" : "rgba(255,255,255,0.05)"}`,
                        borderRadius: 11, overflow: "hidden", transition: "all .3s", position: "relative"
                      }}>
                        {on && <div style={{ position: "absolute", top: 0, left: 0, right: 0,
                          height: 2, background: `linear-gradient(90deg,${p.color},${p.accent}88)` }} />}
                        <div style={{ padding: "13px 15px" }}>
                          {/* Header */}
                          <div style={{ display: "flex", justifyContent: "space-between",
                            alignItems: "flex-start", marginBottom: 10 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <div style={{
                                width: 36, height: 36, borderRadius: 9, flexShrink: 0, fontSize: 18,
                                display: "flex", alignItems: "center", justifyContent: "center",
                                background: on ? `${p.color}15` : "rgba(255,255,255,0.04)",
                                border: `1px solid ${on ? p.color + "25" : "rgba(255,255,255,0.06)"}`,
                                transition: "all .3s"
                              }}>{job.emoji}</div>
                              <div>
                                <div style={{ fontSize: 10, color: on ? "#ddd" : "#444",
                                  fontFamily: "'Share Tech Mono',monospace", fontWeight: 600,
                                  lineHeight: 1.3 }}>{job.name}</div>
                                <div style={{ fontSize: 7, color: "#1e1e1e",
                                  fontFamily: "'Share Tech Mono',monospace", marginTop: 2 }}>
                                  {job.schedule}
                                </div>
                              </div>
                            </div>
                            {/* Toggle */}
                            <div onClick={() => setActiveJobs(prev => {
                              const n = new Set(prev);
                              n.has(job.id) ? n.delete(job.id) : n.add(job.id);
                              return n;
                            })} style={{
                              width: 34, height: 19, borderRadius: 10, cursor: "pointer",
                              background: on ? p.color : "rgba(255,255,255,0.07)",
                              position: "relative", transition: "background .3s", flexShrink: 0, marginTop: 2
                            }}>
                              <div style={{
                                position: "absolute", top: 2.5,
                                left: on ? 16 : 2.5, width: 14, height: 14,
                                borderRadius: "50%", background: "#fff",
                                transition: "left .25s", boxShadow: "0 1px 4px rgba(0,0,0,0.5)"
                              }} />
                            </div>
                          </div>
                          {/* Status badge */}
                          <div style={{ display: "flex", gap: 6, alignItems: "center",
                            marginBottom: 10, minHeight: 16 }}>
                            {isGen && (
                              <span style={{ display: "flex", alignItems: "center", gap: 4,
                                fontSize: 7, color: "#00c8ff", fontFamily: "'Share Tech Mono',monospace" }}>
                                <span style={{ width: 6, height: 6, border: "1.5px solid #00c8ff",
                                  borderTopColor: "transparent", borderRadius: "50%",
                                  display: "inline-block", animation: "spin .8s linear infinite" }} />
                                WRITING
                              </span>
                            )}
                            {nReady > 0 && (
                              <span style={{ fontSize: 7, padding: "1px 7px", borderRadius: 3,
                                background: "rgba(0,255,136,0.1)", color: "#00ff88",
                                fontFamily: "'Share Tech Mono',monospace" }}>{nReady} READY</span>
                            )}
                            {!isGen && nReady === 0 && on && (
                              <span style={{ fontSize: 7, color: "#1a1a1a",
                                fontFamily: "'Share Tech Mono',monospace" }}>STANDING BY</span>
                            )}
                            {!on && (
                              <span style={{ fontSize: 7, color: "#1a1a1a",
                                fontFamily: "'Share Tech Mono',monospace" }}>DISABLED</span>
                            )}
                          </div>
                          {/* RUN ONCE */}
                          <button onClick={() => callAutopilotClaude(job, niche)} style={{
                            width: "100%", padding: "7px",
                            background: on ? `${p.color}12` : "rgba(255,255,255,0.02)",
                            border: `1px solid ${on ? p.color + "22" : "rgba(255,255,255,0.05)"}`,
                            borderRadius: 7, color: on ? p.color : "#2a2a2a",
                            fontFamily: "'Share Tech Mono',monospace", fontSize: 8,
                            cursor: "pointer", letterSpacing: .5,
                            display: "flex", alignItems: "center", justifyContent: "center", gap: 5
                          }}>▶ RUN ONCE NOW</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}

function PageVault({ vaultItems, setVaultItems }) {
  const [filterPlat, setFilterPlat] = useState("all");
  const [search, setSearch]         = useState("");
  const [loading, setLoading]       = useState(true);

  // ── Load from storage on mount ──
  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get("vault-items");
        if (res && res.value) setVaultItems(JSON.parse(res.value));
      } catch (_) {}
      setLoading(false);
    })();
  }, []);

  // ── Persist to storage whenever items change ──
  useEffect(() => {
    if (loading) return;
    (async () => {
      try {
        await window.storage.set("vault-items", JSON.stringify(vaultItems));
      } catch (_) {}
    })();
  }, [vaultItems, loading]);

  const moveItem = (id, newCol) => {
    setVaultItems(prev => prev.map(i => i.id === id ? { ...i, column: newCol } : i));
  };

  const deleteItem = (id) => {
    setVaultItems(prev => prev.filter(i => i.id !== id));
  };

  const exportCSV = () => {
    const rows = [
      ["ID","Agent","Platform","Topic","Column","Saved At","Output"],
      ...vaultItems.map(i => [i.id, i.agentName, i.platform, i.topic, i.column, i.savedAt,
        `"${(i.output||"").replace(/"/g,'""')}"`])
    ];
    const csv = rows.map(r => r.join(",")).join("\n");
    const blob = new Blob([csv], { type:"text/csv" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `creator-os-vault-${Date.now()}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(vaultItems, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `creator-os-vault-${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const filtered = vaultItems.filter(i => {
    const matchPlat = filterPlat === "all" || i.platform === filterPlat;
    const matchSearch = !search || i.agentName.toLowerCase().includes(search.toLowerCase())
      || i.topic.toLowerCase().includes(search.toLowerCase())
      || (i.output||"").toLowerCase().includes(search.toLowerCase());
    return matchPlat && matchSearch;
  });

  const totalByCol = col => filtered.filter(i => i.column === col).length;

  if (loading) return (
    <div style={{ textAlign:"center", padding:"80px 0" }}>
      <div style={{ width:28, height:28, border:"2px solid #A78BFA", borderTopColor:"transparent",
        borderRadius:"50%", animation:"spin .8s linear infinite", margin:"0 auto 12px" }}/>
      <div style={{ color:"#444", fontFamily:"'Share Tech Mono',monospace", fontSize:10 }}>Loading vault…</div>
    </div>
  );

  return (
    <div style={{ animation:"fadeIn .25s ease" }}>
      {/* Toolbar */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, flexWrap:"wrap", gap:10 }}>
        <div>
          <div style={{ fontFamily:"'Orbitron',sans-serif", fontWeight:800, fontSize:20, letterSpacing:1 }}>CONTENT VAULT</div>
          <div style={{ fontSize:9, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginTop:2 }}>
            {vaultItems.length} pieces saved · persists across sessions
          </div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
          {/* Search */}
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search content…"
            style={{ ...INP, width:180, padding:"6px 10px", fontSize:9 }}/>
          {/* Platform filter */}
          {Object.entries(PLATFORMS).map(([k,p]) => (
            <button key={k} onClick={() => setFilterPlat(k)} style={{ padding:"5px 10px", borderRadius:6, cursor:"pointer",
              fontFamily:"'Share Tech Mono',monospace", fontSize:8, transition:"all .2s",
              background:filterPlat===k ? p.bg : "transparent",
              border:`1px solid ${filterPlat===k ? p.color+"44" : "rgba(255,255,255,0.07)"}`,
              color:filterPlat===k ? p.color : "#444" }}>
              {p.short}
            </button>
          ))}
          {/* Export buttons */}
          <button onClick={exportCSV} style={{ padding:"5px 11px", background:"rgba(0,255,136,0.07)",
            border:"1px solid rgba(0,255,136,0.2)", borderRadius:6, color:"#00ff88",
            fontSize:8, fontFamily:"'Share Tech Mono',monospace", cursor:"pointer" }}>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, alignItems:"start" }}>

            const colItems = filtered.filter(i => i.column === col.id);
            return (
              <div key={col.id}>
                {/* Column header */}
                <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:12,
                  padding:"8px 12px", background:"rgba(255,255,255,0.02)",

                </div>

                  <div style={{ padding:"24px 12px", textAlign:"center", border:"1px dashed rgba(255,255,255,0.05)",

                ) : (
                  colItems.map(item => (
                    <VaultCard key={item.id} item={item} onMove={moveItem} onDelete={deleteItem} />
                  ))
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// PAGE: BRAND & IDENTITY HUB
// ═══════════════════════════════════════════════════════════════════════════════

function PageBrand({ niche, addToVault }) {
  const [brand, setBrand] = useState({
    name:"", tagline:"", voice:"", audience:"", pillars:["","","","",""],
    competitors:"", usp:"", palette:["#00ff88","#00c8ff","#A78BFA"], avoidTopics:""
  });
  const [saved, setSaved] = useState(false);
  const [aiOutput, setAiOutput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [activeSection, setActiveSection] = useState("identity");

  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get("brand-profile"); if (r) setBrand(JSON.parse(r.value)); } catch(_){}
    })();
  }, []);

  const save = async () => {
    try { await window.storage.set("brand-profile", JSON.stringify(brand)); setSaved(true); setTimeout(()=>setSaved(false),2000); } catch(_){}
  };

  const generateBrandKit = async () => {
    setAiLoading(true); setAiOutput("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:"You are a brand strategist specializing in creator businesses. Build precise, actionable brand identities.",
          messages:[{role:"user",content:`Build a complete brand identity kit for a content creator:
Niche: ${niche || brand.name || "general creator"}
Name: ${brand.name || "TBD"}
Target audience: ${brand.audience || "general"}
Content pillars: ${brand.pillars.filter(Boolean).join(", ") || "TBD"}
USP: ${brand.usp || "TBD"}

Provide: 1) Brand voice guide (3 adjectives + do/don't list), 2) 5 content pillar suggestions with rationale, 3) Audience avatar (name, age, pain points, desires), 4) 3 tagline options, 5) Competitor differentiation angle, 6) First 30-day content theme.`}]})
      });
      const data = await res.json();
      const out = data.content?.[0]?.text || "";
      setAiOutput(out);
      addToVault({ id:"brand-"+Date.now(), agentName:"Brand Kit Generator", emoji:"🎨", platform:"all", topic:brand.name||niche, output:out, outputType:"brand" });
    } catch(e){ setAiOutput("Error: " + e.message); }
    setAiLoading(false);
  };

  const Section = ({id, label}) => (
    <button onClick={()=>setActiveSection(id)} style={{padding:"7px 14px", background:"none", border:"none",
      borderBottom:`2px solid ${activeSection===id?"#A78BFA":"transparent"}`, color:activeSection===id?"#A78BFA":"#444",
      fontSize:9, fontFamily:"'Share Tech Mono',monospace", cursor:"pointer", letterSpacing:.5}}>
      {label}

  );

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:800, fontSize:20, letterSpacing:1}}>BRAND & IDENTITY HUB</div>
          <div style={{fontSize:9, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginTop:2}}>Define who you are before Claude generates anything</div>
        </div>
        <div style={{display:"flex", gap:8}}>
          <button onClick={generateBrandKit} disabled={aiLoading} style={{padding:"8px 16px",
            background:aiLoading?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#A78BFA,#7C3AED)",
            border:"none", borderRadius:8, color:aiLoading?"#444":"#fff",
            fontFamily:"'Share Tech Mono',monospace", fontSize:9, cursor:aiLoading?"not-allowed":"pointer"}}>
            {aiLoading?"GENERATING…":"🎨 AI BRAND KIT"}
          </button>
          <button onClick={save} style={{padding:"8px 16px",
            background:saved?"rgba(0,255,136,0.1)":"rgba(255,255,255,0.05)",
            border:`1px solid ${saved?"rgba(0,255,136,0.3)":"rgba(255,255,255,0.1)"}`,
            borderRadius:8, color:saved?"#00ff88":"#888",
            fontFamily:"'Share Tech Mono',monospace", fontSize:9, cursor:"pointer"}}>
            {saved?"✓ SAVED":"SAVE"}
          </button>
        </div>
      </div>

      <div style={{display:"flex", gap:0, marginBottom:18, borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
        <Section id="identity" label="Identity"/><Section id="pillars" label="Content Pillars"/>
        <Section id="audience" label="Audience"/><Section id="voice" label="Brand Voice"/>
        {aiOutput && <Section id="kit" label="✦ AI Brand Kit"/>}
      </div>

      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:14}}>
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {activeSection==="identity" && <>
            {[["Creator / Brand Name","name","Your channel name"],["Tagline","tagline","One sentence that captures what you do"],["Unique Selling Point","usp","What makes you different from everyone else in your niche"],["Topics to Avoid","avoidTopics","Content areas you won't touch (controversies, politics, etc)"]].map(([label,key,ph])=>(
              <div key={key}>
                <div style={{fontSize:8, color:"#555", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:5}}>{label.toUpperCase()}</div>
                <textarea value={brand[key]} onChange={e=>setBrand(b=>({...b,[key]:e.target.value}))} placeholder={ph} rows={key==="usp"||key==="avoidTopics"?2:1}
                  style={{...INP, resize:"none", lineHeight:1.6}}/>
              </div>
            ))}

          {activeSection==="pillars" && <>
            <div style={{fontSize:8, color:"#555", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:5}}>YOUR 5 CONTENT PILLARS</div>
            <div style={{fontSize:9, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginBottom:12, lineHeight:1.6}}>
              Pillars are the 4–5 topic buckets all your content falls into. Every post should map to one.
            </div>
            {brand.pillars.map((p,i)=>(
              <div key={i} style={{display:"flex", gap:8, alignItems:"center"}}>
                <div style={{width:22, height:22, borderRadius:5, background:"rgba(167,139,250,0.1)", border:"1px solid rgba(167,139,250,0.25)",
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#A78BFA", flexShrink:0}}>
                  {i+1}
                </div>
                <input value={p} onChange={e=>{ const arr=[...brand.pillars]; arr[i]=e.target.value; setBrand(b=>({...b,pillars:arr})); }}
                  placeholder={["Educational — teach your niche","Inspirational — motivate & aspire","Entertainment — hooks & trends","Personal — behind the scenes","Promotional — products & deals"][i]}
                  style={{...INP, flex:1}}/>
              </div>
            ))}
          </>}

          {activeSection==="audience" && <>
            {[["Target Audience","audience","e.g. 25–35 year old men trying to build wealth while working 9–5"],["Brand Voice (3 words)","voice","e.g. Direct, Motivating, Real — no fluff"],["Main Competitors","competitors","List 3–5 creator names in your niche"]].map(([label,key,ph])=>(
              <div key={key}>
                <div style={{fontSize:8, color:"#555", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:5}}>{label.toUpperCase()}</div>
                <textarea value={brand[key]} onChange={e=>setBrand(b=>({...b,[key]:e.target.value}))} placeholder={ph} rows={2}
                  style={{...INP, resize:"none", lineHeight:1.6}}/>
              </div>
            ))}
          </>}

          {activeSection==="voice" && <>
            <div style={{fontSize:8, color:"#555", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:5}}>BRAND COLOR PALETTE</div>
            <div style={{display:"flex", gap:10}}>
              {brand.palette.map((col,i)=>(
                <div key={i} style={{display:"flex", flexDirection:"column", gap:5, alignItems:"center"}}>
                  <div style={{width:48, height:48, borderRadius:8, background:col, border:"1px solid rgba(255,255,255,0.1)"}}/>
                  <input type="text" value={col} onChange={e=>{ const arr=[...brand.palette]; arr[i]=e.target.value; setBrand(b=>({...b,palette:arr})); }}
                    style={{...INP, width:80, textAlign:"center", fontSize:9, padding:"4px 6px"}}/>
                </div>
              ))}
            </div>
            <div style={{marginTop:12}}>
              <div style={{fontSize:8, color:"#555", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:5}}>BRAND VOICE</div>
              <textarea value={brand.voice} onChange={e=>setBrand(b=>({...b,voice:e.target.value}))} rows={4}
                placeholder="Describe your communication style. e.g. Speak like a knowledgeable friend, not a lecturer. Use short sentences. Never say 'synergy'. Always give a real example..."
                style={{...INP, resize:"none", lineHeight:1.6}}/>
            </div>
          </>}
        </div>

        <div>
          {aiOutput ? (
            <div style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(167,139,250,0.2)", borderRadius:12, overflow:"hidden"}}>
              <div style={{padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(167,139,250,0.05)"}}>
                <span style={{fontSize:9, color:"#A78BFA", fontFamily:"'Share Tech Mono',monospace", letterSpacing:2}}>AI BRAND KIT</span>
                <CopyBtn text={aiOutput} small/>
              </div>
              <div style={{padding:16, fontSize:11, color:"#bbb", fontFamily:"'Share Tech Mono',monospace", lineHeight:1.8, whiteSpace:"pre-wrap", maxHeight:480, overflowY:"auto"}}>
                <Typewriter text={aiOutput} speed={3}/>
              </div>
            </div>
          ) : (
            <div style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:20}}>
              <div style={{fontSize:9, color:"#444", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:14}}>BRAND SUMMARY PREVIEW</div>
              {[["NAME", brand.name||"—"],["TAGLINE", brand.tagline||"—"],["AUDIENCE", brand.audience||"—"],["VOICE", brand.voice||"—"],["USP", brand.usp||"—"]].map(([l,v])=>(
                <div key={l} style={{display:"flex", gap:10, padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                  <span style={{fontSize:8, color:"#444", fontFamily:"'Share Tech Mono',monospace", width:70, flexShrink:0, letterSpacing:1}}>{l}</span>
                  <span style={{fontSize:9, color:v==="—"?"#2a2a2a":"#ccc", fontFamily:"'Share Tech Mono',monospace", lineHeight:1.5}}>{v}</span>
                </div>
              ))}
              <div style={{marginTop:14}}>
                <div style={{fontSize:8, color:"#444", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:8}}>PILLARS</div>
                {brand.pillars.filter(Boolean).map((p,i)=>(
                  <div key={i} style={{fontSize:9, color:"#888", fontFamily:"'Share Tech Mono',monospace", padding:"4px 0"}}>
                    {i+1}. {p}
                  </div>
                ))}
                {!brand.pillars.filter(Boolean).length && <div style={{fontSize:9, color:"#2a2a2a"}}>None set yet</div>}
              </div>
              <button onClick={generateBrandKit} disabled={aiLoading}
                style={{marginTop:18, width:"100%", padding:"11px", background:"linear-gradient(135deg,#A78BFA,#7C3AED)",
                  border:"none", borderRadius:8, color:"#fff", fontFamily:"'Orbitron',sans-serif",

      </div>
    </div>

// PAGE: PERFORMANCE TRACKER
// ═══════════════════════════════════════════════════════════════════════════════

function PagePerformance() {
  const [posts, setPosts] = useState([]);
  const [form, setForm]   = useState({ platform:"tiktok", title:"", views:"", likes:"", comments:"", shares:"", date:"", type:"Hook Video", notes:"" });
  const [adding, setAdding] = useState(false);
  const [insight, setInsight] = useState(""); const [insightLoading, setInsightLoading] = useState(false);

  useEffect(()=>{ (async()=>{ try{ const r=await window.storage.get("perf-posts"); if(r) setPosts(JSON.parse(r.value)); }catch(_){} })(); },[]);
  const persist = (p) => { try{ window.storage.set("perf-posts", JSON.stringify(p)); }catch(_){} };

  const addPost = () => {
    if(!form.title) return;
    const entry = { ...form, id:"post-"+Date.now(), views:Number(form.views)||0, likes:Number(form.likes)||0,
      comments:Number(form.comments)||0, shares:Number(form.shares)||0, savedAt:new Date().toLocaleDateString() };
    const next = [entry, ...posts];
    setPosts(next); persist(next);
    setForm({ platform:"tiktok", title:"", views:"", likes:"", comments:"", shares:"", date:"", type:"Hook Video", notes:"" });
    setAdding(false);
  };

  const deletePost = (id) => { const next=posts.filter(p=>p.id!==id); setPosts(next); persist(next); };

  const getInsight = async () => {
    if(!posts.length || insightLoading) return;
    setInsightLoading(true);
    const top = [...posts].sort((a,b)=>b.views-a.views).slice(0,5);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:"You are a content performance analyst. Identify patterns, what's working, and give specific actionable recommendations.",
          messages:[{role:"user", content:`Analyze these top performing posts and tell me what's working and what to do more of:\n${JSON.stringify(top,null,2)}\n\nAll posts for context:\nTotal: ${posts.length}, Avg views: ${Math.round(posts.reduce((s,p)=>s+p.views,0)/posts.length)}\n\nGive: 1) What content type/format is winning, 2) Best platform for this creator, 3) 3 specific things to replicate immediately, 4) What to stop doing.`}]})
      });
      const data = await res.json();
      setInsight(data.content?.[0]?.text||"");
    } catch(e){ setInsight("Error: "+e.message); }
    setInsightLoading(false);
  };

  const totalViews = posts.reduce((s,p)=>s+p.views,0);
  const avgViews   = posts.length ? Math.round(totalViews/posts.length) : 0;
  const topPost    = posts.reduce((best,p)=>p.views>best.views?p:best, {views:0,title:"None yet"});

  const CONTENT_TYPES = ["Hook Video","Trend Remix","Educational","Behind Scenes","Story Time","Carousel","Reel","Tutorial","Vlog","Short"];

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:800, fontSize:20, letterSpacing:1}}>PERFORMANCE TRACKER</div>
          <div style={{fontSize:9, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginTop:2}}>Log what you post — Claude finds the pattern</div>
        </div>
        <div style={{display:"flex", gap:8}}>
          {posts.length>0 && <button onClick={getInsight} disabled={insightLoading} style={{padding:"8px 16px",
            background:insightLoading?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#00ff88,#00c8ff)",
            border:"none", borderRadius:8, color:insightLoading?"#444":"#000",
            fontFamily:"'Share Tech Mono',monospace", fontSize:9, cursor:insightLoading?"not-allowed":"pointer"}}>
            {insightLoading?"ANALYZING…":"🧠 AI INSIGHTS"}
          </button>}
          <button onClick={()=>setAdding(a=>!a)} style={{padding:"8px 16px",
            background:adding?"rgba(255,68,68,0.1)":"rgba(255,255,255,0.06)",
            border:`1px solid ${adding?"rgba(255,68,68,0.25)":"rgba(255,255,255,0.1)"}`,
            borderRadius:8, color:adding?"#ff4444":"#fff",
            fontFamily:"'Share Tech Mono',monospace", fontSize:9, cursor:"pointer"}}>
            {adding?"CANCEL":"+ LOG POST"}
          </button>
        </div>
      </div>

      {/* Stats bar */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:18}}>
        {[["POSTS LOGGED",posts.length,"#fff"],["TOTAL VIEWS",totalViews.toLocaleString(),"#00F2EA"],["AVG VIEWS",avgViews.toLocaleString(),"#A78BFA"],["BEST POST",topPost.views.toLocaleString()+" views","#00ff88"]].map(([l,v,c])=>(
          <div key={l} style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:9, padding:"12px 14px"}}>
            <div style={{fontSize:7, color:"#333", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:18, color:c}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Add form */}
      {adding && (
        <div style={{background:"rgba(0,255,136,0.04)", border:"1px solid rgba(0,255,136,0.15)", borderRadius:12, padding:18, marginBottom:18, animation:"fadeIn .2s ease"}}>
          <div style={{fontSize:9, color:"#00ff88", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:14}}>LOG NEW POST</div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:10}}>
            <div>
              <div style={{fontSize:7, color:"#555", letterSpacing:1, fontFamily:"'Share Tech Mono',monospace", marginBottom:4}}>PLATFORM</div>
              <select value={form.platform} onChange={e=>setForm(f=>({...f,platform:e.target.value}))} style={{...INP}}>
                {["tiktok","instagram","youtube"].map(p=><option key={p} value={p} style={{background:"#111"}}>{PLATFORMS[p].name}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:7, color:"#555", letterSpacing:1, fontFamily:"'Share Tech Mono',monospace", marginBottom:4}}>CONTENT TYPE</div>
              <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))} style={{...INP}}>
                {CONTENT_TYPES.map(t=><option key={t} value={t} style={{background:"#111"}}>{t}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:7, color:"#555", letterSpacing:1, fontFamily:"'Share Tech Mono',monospace", marginBottom:4}}>DATE POSTED</div>
              <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{...INP, colorScheme:"dark"}}/>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:7, color:"#555", letterSpacing:1, fontFamily:"'Share Tech Mono',monospace", marginBottom:4}}>TITLE / HOOK</div>
            <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="What was the video/post about?" style={INP}/>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:10}}>
            {[["VIEWS","views"],["LIKES","likes"],["COMMENTS","comments"],["SHARES","shares"]].map(([l,k])=>(
              <div key={k}>
                <div style={{fontSize:7, color:"#555", letterSpacing:1, fontFamily:"'Share Tech Mono',monospace", marginBottom:4}}>{l}</div>
                <input type="number" value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder="0" style={INP}/>
              </div>
            ))}
          </div>
          <div style={{display:"flex", gap:10}}>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes — what worked, what didn't, any observations…" rows={2} style={{...INP, flex:1, resize:"none"}}/>
            <button onClick={addPost} style={{padding:"0 24px", background:"linear-gradient(135deg,#00ff88,#00c8ff)", border:"none", borderRadius:8, color:"#000", fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:11, cursor:"pointer"}}>SAVE</button>
          </div>
        </div>
      )}

      <div style={{display:"grid", gridTemplateColumns:insight?"1fr 1fr":"1fr", gap:16}}>
        {/* Posts list */}
        <div>
          {posts.length===0 ? (
            <div style={{textAlign:"center", padding:"60px 0", color:"#2a2a2a"}}>
              <div style={{fontSize:36, opacity:.15, marginBottom:12}}>📊</div>
              <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:16, letterSpacing:2}}>NO DATA YET</div>
              <div style={{fontSize:9, fontFamily:"'Share Tech Mono',monospace", marginTop:8}}>Log your first post to start tracking performance</div>
            </div>
          ) : (
            <div style={{display:"flex", flexDirection:"column", gap:8}}>
              {[...posts].sort((a,b)=>b.views-a.views).map(post=>{
                const p=PLATFORMS[post.platform];
                const er = post.views>0 ? (((post.likes+post.comments+post.shares)/post.views)*100).toFixed(1) : 0;
                return (
                  <div key={post.id} style={{background:"rgba(255,255,255,0.02)", border:`1px solid rgba(255,255,255,0.06)`, borderRadius:9, padding:"12px 14px", display:"flex", alignItems:"center", gap:12, borderLeft:`3px solid ${p.color}`}}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontSize:11, color:"#ddd", fontFamily:"'Share Tech Mono',monospace", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{post.title}</div>
                      <div style={{display:"flex", gap:10, marginTop:4, flexWrap:"wrap"}}>
                        <span style={{fontSize:8, color:p.color}}>{p.name}</span>
                        <span style={{fontSize:8, color:"#555"}}>{post.type}</span>
                        <span style={{fontSize:8, color:"#444"}}>{post.date||post.savedAt}</span>
                      </div>
                    </div>
                    <div style={{display:"flex", gap:14, flexShrink:0}}>
                      {[["👁",post.views.toLocaleString()],["❤️",post.likes.toLocaleString()],["💬",post.comments.toLocaleString()]].map(([ic,v])=>(
                        <div key={ic} style={{textAlign:"center"}}>
                          <div style={{fontSize:10}}>{ic}</div>
                          <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:11, color:"#fff"}}>{v}</div>
                        </div>
                      ))}
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:8, color:"#555"}}>ER</div>
                        <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:11, color:er>5?"#00ff88":er>2?"#F77737":"#ff4444"}}>{er}%</div>
                      </div>
                    </div>
                    <button onClick={()=>deletePost(post.id)} style={{background:"none", border:"none", color:"#333", fontSize:16, cursor:"pointer", padding:"0 4px"}}>×</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* AI Insights */}
        {insight && (
          <div style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(0,255,136,0.15)", borderRadius:12, overflow:"hidden"}}>
            <div style={{padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(0,255,136,0.04)"}}>
              <span style={{fontSize:9, color:"#00ff88", fontFamily:"'Share Tech Mono',monospace", letterSpacing:2}}>AI PERFORMANCE INSIGHTS</span>
              <CopyBtn text={insight} small/>
            </div>
            <div style={{padding:16, fontSize:11, color:"#bbb", fontFamily:"'Share Tech Mono',monospace", lineHeight:1.8, whiteSpace:"pre-wrap", maxHeight:500, overflowY:"auto"}}>
              <Typewriter text={insight} speed={3}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// PAGE: IDEA ENGINE
// ═══════════════════════════════════════════════════════════════════════════════

function PageIdeas({ niche, addToVault }) {
  const [seed, setSeed]         = useState("");
  const [platform, setPlatform] = useState("all");
  const [ideas, setIdeas]       = useState([]);
  const [loading, setLoading]   = useState(false);
  const [saved, setSaved]       = useState([]);

  useEffect(()=>{ (async()=>{ try{ const r=await window.storage.get("saved-ideas"); if(r) setSaved(JSON.parse(r.value)); }catch(_){} })(); },[]);
  const persistSaved = (s) => { try{ window.storage.set("saved-ideas",JSON.stringify(s)); }catch(_){} };

  const generate = async () => {
    if(!seed.trim()||loading) return;
    setLoading(true); setIdeas([]);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:`You are a viral content idea generator for social media creators. Always respond ONLY with valid JSON, no markdown, no preamble.`,
          messages:[{role:"user", content:`Generate 8 content ideas based on this seed: "${seed}" for a creator in the "${niche||"general"}" niche${platform!=="all"?` focusing on ${PLATFORMS[platform].name}`:""}. 

Return ONLY a JSON array with this exact structure:
[{"title":"...","platform":"tiktok|instagram|youtube|all","angle":"...","hook":"...","format":"...","viralScore":8}]

Fields: title (catchy title), platform (best platform), angle (the unique spin), hook (opening line), format (content type), viralScore (1-10).`}]})
      });
      const data = await res.json();
      const text = data.content?.[0]?.text||"[]";
      const clean = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      setIdeas(Array.isArray(parsed)?parsed:[]);
    } catch(e){ setIdeas([]); }
    setLoading(false);
  };

  const saveIdea = (idea) => {
    const entry = { ...idea, id:"idea-"+Date.now(), seed, savedAt:new Date().toLocaleString() };
    const next  = [entry, ...saved];
    setSaved(next); persistSaved(next);
    addToVault({ id:entry.id, agentName:"Idea Engine", emoji:"💡", platform:idea.platform||"all", topic:idea.title, output:`TITLE: ${idea.title}\nANGLE: ${idea.angle}\nHOOK: "${idea.hook}"\nFORMAT: ${idea.format}\nVIRAL SCORE: ${idea.viralScore}/10`, outputType:"idea" });
  };

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:800, fontSize:20, letterSpacing:1, marginBottom:4}}>IDEA ENGINE</div>
      <div style={{fontSize:9, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginBottom:18}}>Seed a rough concept — Claude expands it into 8 viral angles across platforms</div>

      <div style={{display:"flex", gap:10, marginBottom:18}}>
        <input value={seed} onChange={e=>setSeed(e.target.value)} onKeyDown={e=>e.key==="Enter"&&generate()}
          placeholder="Type any rough idea, topic, or question… e.g. 'why most people never get rich'"
          style={{...INP, flex:1, padding:"12px 14px", fontSize:12}}/>
        <select value={platform} onChange={e=>setPlatform(e.target.value)} style={{...INP, width:140}}>
          {Object.entries(PLATFORMS).map(([k,v])=><option key={k} value={k} style={{background:"#111"}}>{v.name}</option>)}
        </select>
        <button onClick={generate} disabled={loading||!seed.trim()} style={{padding:"12px 24px",
          background:loading?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#F77737,#E1306C)",
          border:"none", borderRadius:9, color:loading?"#444":"#fff",
          fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:11,
          cursor:loading?"not-allowed":"pointer", letterSpacing:.5, whiteSpace:"nowrap"}}>
          {loading?"THINKING…":"💡 GENERATE"}
        </button>
      </div>

      {loading && (
        <div style={{textAlign:"center", padding:"60px 0"}}>
          <div style={{width:32,height:32,border:"3px solid #F77737",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 14px"}}/>
          <div style={{fontSize:10, color:"#555", fontFamily:"'Share Tech Mono',monospace"}}>Finding the viral angles…</div>
        </div>
      )}

      {ideas.length>0 && (
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:11, marginBottom:20}}>
          {ideas.map((idea,i)=>{
            const p = PLATFORMS[idea.platform]||PLATFORMS.all;
            return (
              <div key={i} style={{background:"rgba(255,255,255,0.025)", border:`1px solid rgba(255,255,255,0.07)`,
                borderRadius:11, padding:16, borderLeft:`3px solid ${p.color}`, position:"relative"}}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10}}>
                  <div style={{flex:1, minWidth:0, paddingRight:8}}>
                    <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:13, color:"#fff", marginBottom:6, lineHeight:1.4}}>{idea.title}</div>
                    <Badge platform={idea.platform||"all"}/>
                  </div>
                  <div style={{textAlign:"center", flexShrink:0}}>
                    <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:800, fontSize:22,
                      color:idea.viralScore>=8?"#00ff88":idea.viralScore>=6?"#F77737":"#ff4444"}}>{idea.viralScore}</div>
                    <div style={{fontSize:7, color:"#444", fontFamily:"'Share Tech Mono',monospace"}}>VIRAL SCORE</div>
                  </div>
                </div>
                <div style={{fontSize:9, color:"#777", fontFamily:"'Share Tech Mono',monospace", marginBottom:6}}>
                  <span style={{color:"#555"}}>ANGLE: </span>{idea.angle}
                </div>
                <div style={{fontSize:10, color:"#A78BFA", fontFamily:"'Share Tech Mono',monospace", marginBottom:6, fontStyle:"italic"}}>
                  "{idea.hook}"
                </div>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10}}>
                  <span style={{fontSize:8, color:"#444", background:"rgba(255,255,255,0.04)", padding:"2px 8px", borderRadius:4}}>{idea.format}</span>
                  <button onClick={()=>saveIdea(idea)} style={{padding:"4px 12px", background:"rgba(0,255,136,0.08)",
                    border:"1px solid rgba(0,255,136,0.2)", borderRadius:5, color:"#00ff88",
                    fontSize:8, fontFamily:"'Share Tech Mono',monospace", cursor:"pointer"}}>
                    SAVE TO VAULT
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {saved.length>0 && (
        <div>
          <div style={{fontSize:9, color:"#444", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:10}}>SAVED IDEAS ({saved.length})</div>
          <div style={{display:"flex", flexDirection:"column", gap:7}}>
            {saved.slice(0,6).map(idea=>{
              const p=PLATFORMS[idea.platform]||PLATFORMS.all;
              return (
                <div key={idea.id} style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8, padding:"10px 14px", display:"flex", alignItems:"center", gap:12, borderLeft:`3px solid ${p.color}`}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10, color:"#ccc", fontFamily:"'Share Tech Mono',monospace"}}>{idea.title}</div>
                    <div style={{fontSize:8, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginTop:2}}>Seed: "{idea.seed}" · {idea.savedAt}</div>
                  </div>
                  <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:14, color:idea.viralScore>=8?"#00ff88":"#888"}}>{idea.viralScore}/10</div>
                  <button onClick={()=>{const next=saved.filter(s=>s.id!==idea.id);setSaved(next);persistSaved(next);}} style={{background:"none",border:"none",color:"#333",fontSize:14,cursor:"pointer"}}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}
