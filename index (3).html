// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════════

export default function CreatorOS() {
  // ── Navigation ──
  const [page, setPage] = useState("overview");

  // ── Vault (persistent content store) ──
  const [vaultItems, setVaultItems]           = useState([]);

  // Restore autopilot state on mount
  useEffect(() => {
    (async () => {
      try {
        const wasRunning = await window.storage.get('autopilot-running');
        const savedNiche = await window.storage.get('autopilot-niche');
        if (wasRunning?.value === 'true' && savedNiche?.value) {
          setNicheSet(true);
          // Don't auto-restart intervals — user must press START again
          // But show a banner that autopilot was running
          setLiveLog(prev => [{
            time: new Date().toTimeString().slice(0,8),
            msg: 'Autopilot was active — press START to resume generating content',
            platform: 'all', agent: false
          }, ...prev]);
        }
      } catch(_) {}
    })();
  }, []);

  // Helper: push a completed result into the vault
  const addToVault = useCallback((item) => {
    setVaultItems(prev => {
      const entry = {
        id:        item.id || ("vault-" + Date.now()),
        agentName: item.agentName || item.name || "Agent",
        emoji:     item.emoji || "⚡",
        platform:  item.platform || "all",
        topic:     item.topic || item.niche || "",
        output:    item.output || "",
        outputType:item.outputType || "text",
        column:    "generated",
        savedAt:   new Date().toLocaleString(),
      };
      const next = [entry, ...prev];
      // fire-and-forget persist
      try { window.storage.set("vault-items", JSON.stringify(next)); } catch(_) {}
      return next;
    });
  }, []);

  // ── Analytics ──
  const [stats, setStats]                     = useState(initStats);
  const [selectedPlatform, setSelectedPlatform] = useState("youtube");
  const [liveLog, setLiveLog]                 = useState(initLogs);

  // ── Settings / Social Links ──
  const [showSettings, setShowSettings]       = useState(false);
  const [socialLinks, setSocialLinks]         = useState({youtube:"",tiktok:"",instagram:"",twitter:"",twitch:""});
  useEffect(()=>{
    (async()=>{ try{ const r=await window.storage.get("social-links"); if(r) setSocialLinks(JSON.parse(r.value)); }catch(_){} })();
  },[]);
  const saveSocialLinks=(links)=>{ setSocialLinks(links); try{ window.storage.set("social-links",JSON.stringify(links)); }catch(_){} };

  // ── Agent Studio ──
  const [agentResults, setAgentResults]       = useState([]);
  const [runningAgents, setRunningAgents]     = useState(new Set());

  // ── Autopilot ──
  const [niche, setNiche]                     = useState("Top 500 Siege educational content — ranked improvement, operator guides, Arc Raiders meta");
  const [nicheSet, setNicheSet]               = useState(true);
  const [autopilotRunning, setAutopilotRunning] = useState(false);
  const [activeJobs, setActiveJobs]           = useState(new Set(AUTOPILOT_JOBS.map(j=>j.id)));
  const [queue, setQueue]                     = useState([]);
  const [totalGenerated, setTotalGenerated]   = useState(0);
  const [daysPassed, setDaysPassed]           = useState(0);
  const [currentWeek, setCurrentWeek]         = useState(1);
  const autopilotRef                          = useRef(false);
  const intervalRefs                          = useRef({});

  // ── Live ticker — only runs when autopilot is active, doesn't fake view counts ──
  useEffect(() => {
    const iv = setInterval(() => {
      if (Math.random() > 0.7 && autopilotRunning) {
        const pool = [
          {msg:"Autopilot running — scripts generating in background", platform:"all",       agent:true},
          {msg:"Siege Breakdown script queued — check Vault when ready", platform:"youtube",  agent:true},
          {msg:"Hook batch generating for TikTok clips",                 platform:"tiktok",   agent:true},
          {msg:"Arc Raiders early meta script in progress",              platform:"youtube",  agent:true},
        ];
        const e = pool[Math.floor(Math.random()*pool.length)];
        setLiveLog(prev => [{time:new Date().toTimeString().slice(0,8), ...e}, ...prev.slice(0,24)]);
      }
    }, 4000);
    return () => clearInterval(iv);
  }, [autopilotRunning]);

  // Real elapsed-day tracker — stores start date in storage
  useEffect(() => {
    if (!autopilotRunning) return;
    (async () => {
      try {
        let startDate;
        const stored = await window.storage.get('sprint-start-date');
        if (stored) {
          startDate = new Date(stored.value);
        } else {
          startDate = new Date();
          await window.storage.set('sprint-start-date', startDate.toISOString());
        }
        const msPerDay = 86400000;
        const elapsed  = Math.floor((Date.now() - startDate.getTime()) / msPerDay);
        const days     = Math.min(elapsed, 91);
        setDaysPassed(days);
        setCurrentWeek(Math.min(Math.ceil(days / 7) || 1, 13));
      } catch(_) {}
    })();
  }, [autopilotRunning]);

  // ── Claude: Agent Studio ─────────────────────────────────────────────────────
  const runAgent = useCallback(async (template, topic) => {
    setRunningAgents(prev => new Set([...prev, template.id]));
    const ts = new Date().toLocaleTimeString();
    const base = {id:template.id+"-"+Date.now(), agentName:template.name, emoji:template.emoji,
      platform:template.platform, topic, outputType:template.outputType, timestamp:ts, status:"generating", output:null};
    setAgentResults(prev => [base, ...prev]);
    setLiveLog(prev => [{time:ts, msg:`${template.name} started on "${topic}"`, platform:template.platform, agent:true}, ...prev.slice(0,24)]);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:template.systemPrompt, messages:[{role:"user",content:template.userPromptTemplate(topic)}]})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const output = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
      setAgentResults(prev => prev.map(r => r.id===base.id ? {...r,status:"ready",output} : r));
      addToVault({ ...base, output });
      setLiveLog(prev => [{time:new Date().toLocaleTimeString(), msg:`${template.name} completed "${topic}"`, platform:template.platform, agent:true}, ...prev.slice(0,24)]);
    } catch(err) {
      setAgentResults(prev => prev.map(r => r.id===base.id ? {...r,status:"failed",output:err.message} : r));
    } finally {
      setRunningAgents(prev => { const n=new Set(prev); n.delete(template.id); return n; });
    }
  }, []);

  // ── Claude: Autopilot ────────────────────────────────────────────────────────
  // ── Concurrency gate: only 1 API call at a time, 6s minimum gap between calls ──
  const concurrentRef = useRef(0);
  const pendingQueue  = useRef([]);   // {job, nicheVal} objects waiting to fire
  const draining      = useRef(false);

  // Drains pendingQueue one item at a time, 6s apart, max 1 in-flight
  const drain = useCallback(() => {
    if (draining.current) return;
    draining.current = true;
    const tick = async () => {
      if (pendingQueue.current.length === 0) { draining.current = false; return; }
      if (concurrentRef.current >= 1) { setTimeout(tick, 3000); return; }
      const {job, nicheVal} = pendingQueue.current.shift();
      concurrentRef.current = 1;
      // run the actual API call
      const id = job.id + "-" + Date.now();
      const ts = new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
      const item = {id, agentName:job.name, emoji:job.emoji, platform:job.platform,
        niche:nicheVal, timestamp:ts, status:"generating", output:null};
      setQueue(q => [item, ...q.slice(0,49)]);
      setTotalGenerated(n => n+1);
      setLiveLog(prev => [{time:ts, msg:`${job.emoji} ${job.name} — writing now`, platform:job.platform, agent:true}, ...prev.slice(0,24)]);
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000,
            system:job.systemPrompt, messages:[{role:"user",content:job.buildPrompt(nicheVal)}]})
        });
        const data = await res.json();
        if (data.error) throw new Error(JSON.stringify(data.error));
        const output = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
        setQueue(q => q.map(i => i.id===id ? {...i, status:"ready", output} : i));
        addToVault({id, agentName:job.name, emoji:job.emoji, platform:job.platform, topic:nicheVal, output, outputType:"autopilot"});
        setLiveLog(prev => [{time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}), msg:`✓ ${job.name} done — check Queue`, platform:job.platform, agent:true}, ...prev.slice(0,24)]);
      } catch(err) {
        const msg = err.message || "Unknown error";
        setQueue(q => q.map(i => i.id===id ? {...i, status:"failed", output:msg} : i));
        setLiveLog(prev => [{time:ts, msg:`✗ ${job.name} failed: ${msg.slice(0,60)}`, platform:job.platform, agent:false}, ...prev.slice(0,24)]);
      } finally {
        concurrentRef.current = 0;
      }
      // 6s cooldown between calls regardless of success/failure
      setTimeout(tick, 6000);
    };
    tick();
  }, [addToVault]);

  // Public: enqueue a single job (used by RUN NOW buttons and autopilot)
  const callAutopilotClaude = useCallback((job, nicheVal) => {
    pendingQueue.current.push({job, nicheVal});
    drain();
  }, [drain]);

  const startAutopilot = useCallback(() => {
    if (!nicheSet || autopilotRef.current) return;
    autopilotRef.current = true;
    setAutopilotRunning(true);
    try { window.storage.set('autopilot-running', 'true'); } catch(_) {}
    try { window.storage.set('autopilot-niche', niche); } catch(_) {}

    const enabledJobs = AUTOPILOT_JOBS.filter(job => activeJobs.has(job.id));

    // Queue all jobs 12s apart so the drain loop handles them one-by-one
    enabledJobs.forEach((job, idx) => {
      // Initial fire: staggered
      setTimeout(() => {
        if (!autopilotRef.current) return;
        pendingQueue.current.push({job, nicheVal: niche});
        drain();
        // Repeat interval: minimum 15 min so we never flood the API
        const iv = setInterval(() => {
          if (!autopilotRef.current) return;
          pendingQueue.current.push({job, nicheVal: niche});
          drain();
        }, Math.max(job.interval, 15 * 60 * 1000));
        intervalRefs.current[job.id] = iv;
      }, idx * 12000);
    });
  }, [nicheSet, niche, activeJobs, drain]);

  const stopAutopilot = useCallback(() => {
    autopilotRef.current = false;
    setAutopilotRunning(false);
    Object.values(intervalRefs.current).forEach(clearInterval);
    intervalRefs.current = {};
    pendingQueue.current = [];
    draining.current = false;
    concurrentRef.current = 0;
    try { window.storage.set('autopilot-running', 'false'); } catch(_) {}
  }, []);

  useEffect(() => () => stopAutopilot(), []);

  // ── Nav config ───────────────────────────────────────────────────────────────
  const totalRev = Object.values(stats).reduce((s,p)=>s+p.revenue,0);
  const activeAgentCount = runningAgents.size;
  const readyQueueCount = queue.filter(i=>i.status==="ready").length;

  const NAV = [
    {key:"overview",    label:"Overview",    icon:"◈"},
    {key:"guide",       label:"Guide",       icon:"📖"},
    {key:"agents",      label:"Agents",      icon:"⚡", badge: activeAgentCount > 0 ? activeAgentCount : null},
    {key:"autopilot",   label:"Autopilot",   icon:"🔄", badge: autopilotRunning ? "ON" : null, badgeColor:"#00ff88"},
    {key:"pipeline",    label:"Pipeline",    icon:"🎥"},
    {key:"shorts",      label:"Shorts",      icon:"✂️"},
    {key:"ideas",       label:"Ideas",       icon:"💡"},
    {key:"vault",       label:"Vault",       icon:"🗄", badge: vaultItems.filter(i=>i.column==="generated").length || null, badgeColor:"#A78BFA"},
    {key:"analytics",   label:"Analytics",   icon:"📈"},
    {key:"performance", label:"Perf",        icon:"📊"},
    {key:"clips",       label:"Clips",       icon:"🎮"},
    {key:"keywords",    label:"Keywords",    icon:"🔑"},
    {key:"recycle",     label:"Recycle",     icon:"♻️"},
    {key:"collab",      label:"Collabs",     icon:"🤝"},
    {key:"audit",       label:"Audit",       icon:"🔎"},
    {key:"deals",       label:"Deals",       icon:"💼"},
    {key:"money",       label:"Monetize",    icon:"💰"},
    {key:"rate",        label:"Rates",       icon:"💲"},
    {key:"brand",       label:"Brand",       icon:"🎨"},
    {key:"competitors", label:"Intel",       icon:"🔍"},
    {key:"goals",       label:"Goals",       icon:"🎯"},
    {key:"learn",       label:"Learn",       icon:"📚"},
    {key:"content",     label:"Content",     icon:"▦"},
    {key:"revenue",     label:"Revenue",     icon:"◉"},
  ];

  return (
    <div style={{minHeight:"100vh", background:"#06080d", fontFamily:"'Share Tech Mono', monospace", color:"#fff"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Share+Tech+Mono&display=swap');
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
        @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
        input::placeholder,textarea::placeholder{color:#252525}
        select option{background:#0e1018}
        ::-webkit-scrollbar{width:3px;height:3px}
        ::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:2px}
      `}</style>

      {/* ── HEADER ── */}
      <div style={{borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"0 22px",height:56,
        display:"flex",alignItems:"center",justifyContent:"space-between",
        background:"rgba(6,8,13,0.98)",backdropFilter:"blur(20px)",position:"sticky",top:0,zIndex:100}}>

        {/* Logo */}
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <div style={{width:32,height:32,borderRadius:8,
            background:autopilotRunning?"linear-gradient(135deg,#00ff88,#00c8ff)":"linear-gradient(135deg,#A78BFA,#00F2EA)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,transition:"background .5s"}}>⚡</div>
          <div>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:17,letterSpacing:2}}>CREATOR OS</div>
            <div style={{fontSize:7,color:"#2a2a2a",letterSpacing:2}}>@ohPost · @oh.post · TOP 500 SIEGE · 24 MODULES</div>
          </div>
        </div>

        {/* Nav */}
        <div style={{display:"flex",gap:1,overflowX:"auto",maxWidth:720,scrollbarWidth:"none"}}>
          {NAV.map(n=>(
            <button key={n.key} onClick={()=>setPage(n.key)} style={{
              padding:"6px 10px",background:page===n.key?"rgba(255,255,255,0.07)":"none",
              border:`1px solid ${page===n.key?"rgba(255,255,255,0.11)":"transparent"}`,
              borderRadius:7,color:page===n.key?"#fff":"#3a3a3a",
              fontSize:8,fontFamily:"'Share Tech Mono', monospace",cursor:"pointer",letterSpacing:.3,
              transition:"all .2s",position:"relative",whiteSpace:"nowrap",flexShrink:0}}>
              <span style={{marginRight:3,opacity:.7}}>{n.icon}</span>{n.label}
              {n.badge&&(
                <span style={{position:"absolute",top:1,right:1,minWidth:13,height:13,padding:"0 2px",
                  background:n.badgeColor||"#A78BFA",borderRadius:6,fontSize:6,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  color:"#000",fontWeight:700,fontFamily:"'Orbitron',sans-serif"}}>
                  {n.badge}
                </span>
              )}
            </button>
          ))}
        </div>

        {/* Right stats */}
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          {niche&&nicheSet&&(
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:7,color:"#2a2a2a",letterSpacing:2}}>NICHE</div>
              <div style={{fontSize:10,color:"#00ff88",fontFamily:"'Share Tech Mono', monospace",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{niche}</div>
            </div>
          )}
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:7,color:"#2a2a2a",letterSpacing:2}}>REVENUE</div>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:18,color:"#00ff88"}}>${totalRev.toFixed(0)}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 11px",borderRadius:7,
            background:autopilotRunning?"rgba(0,255,136,0.07)":"rgba(255,255,255,0.03)",
            border:`1px solid ${autopilotRunning?"rgba(0,255,136,0.18)":"rgba(255,255,255,0.05)"}`,transition:"all .4s"}}>
            <div style={{width:5,height:5,borderRadius:"50%",background:autopilotRunning?"#00ff88":"#1a1a1a",
              boxShadow:autopilotRunning?"0 0 7px #00ff88":"none",
              animation:autopilotRunning?"pulse 1.2s infinite":"none",transition:"all .4s"}}/>
            <span style={{fontSize:9,color:autopilotRunning?"#00ff88":"#2a2a2a",fontFamily:"'Share Tech Mono', monospace",transition:"color .4s"}}>
              {autopilotRunning?`AUTOPILOT ON`:`IDLE`}
            </span>
          </div>
          <button onClick={()=>setShowSettings(true)} title="Settings" style={{
            width:32,height:32,borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",
            background:Object.values(socialLinks).some(v=>v)?"rgba(0,255,136,0.08)":"rgba(255,255,255,0.03)",
            color:Object.values(socialLinks).some(v=>v)?"#00ff88":"#444",
            fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"
          }}>⚙</button>
        </div>
      </div>

      {/* ── SETTINGS MODAL ── */}
      {showSettings&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(8px)"}}
          onClick={e=>e.target===e.currentTarget&&setShowSettings(false)}>
          <div style={{background:"#0d0f18",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,
            padding:"28px 32px",width:580,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto",position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
              <div>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:20,letterSpacing:1}}>SETTINGS</div>
                <div style={{fontSize:9,color:"#444",fontFamily:"'Share Tech Mono',monospace",marginTop:3}}>Channel links · auto-saved · used in Analytics and Overview</div>
              </div>
              <button onClick={()=>setShowSettings(false)} style={{width:32,height:32,borderRadius:8,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"#666",fontSize:16,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontSize:8,color:"#A78BFA",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:14}}>YOUR CHANNEL LINKS</div>
            {[
              {key:"youtube",   label:"YouTube",   icon:"▶", color:"#FF3A3A", placeholder:"https://youtube.com/@ohPost"},
              {key:"tiktok",    label:"TikTok",    icon:"♪", color:"#00F2EA", placeholder:"https://tiktok.com/@oh.post"},
              {key:"instagram", label:"Instagram", icon:"◉", color:"#E1306C", placeholder:"https://instagram.com/ohpost"},
              {key:"twitter",   label:"Twitter/X", icon:"𝕏", color:"#1DA1F2", placeholder:"https://x.com/ohpost"},
              {key:"twitch",    label:"Twitch",    icon:"◈", color:"#9146FF", placeholder:"https://twitch.tv/ohpost"},
            ].map(({key,label,icon,color,placeholder})=>(
              <div key={key} style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                  <div style={{width:24,height:24,borderRadius:6,background:`${color}18`,border:`1px solid ${color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color,flexShrink:0}}>{icon}</div>
                  <span style={{fontSize:9,color:"#888",fontFamily:"'Share Tech Mono',monospace"}}>{label}</span>
                  {socialLinks[key]&&<span style={{fontSize:7,padding:"1px 6px",borderRadius:3,background:"rgba(0,255,136,0.1)",color:"#00ff88",fontFamily:"'Share Tech Mono',monospace"}}>SAVED ✓</span>}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input value={socialLinks[key]||""} onChange={e=>setSocialLinks(prev=>({...prev,[key]:e.target.value}))}
                    onBlur={e=>saveSocialLinks({...socialLinks,[key]:e.target.value})}
                    placeholder={placeholder}
                    style={{...INP,flex:1,padding:"9px 12px",fontSize:10,borderColor:socialLinks[key]?`${color}40`:"rgba(255,255,255,0.08)"}}/>
                  {socialLinks[key]&&<a href={socialLinks[key]} target="_blank" rel="noreferrer" style={{padding:"9px 14px",background:`${color}12`,border:`1px solid ${color}25`,borderRadius:8,color,fontSize:9,fontFamily:"'Share Tech Mono',monospace",textDecoration:"none",display:"flex",alignItems:"center",whiteSpace:"nowrap",flexShrink:0}}>OPEN ↗</a>}
                </div>
              </div>
            ))}
            <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:18,marginTop:8}}>
              <div style={{fontSize:8,color:"#A78BFA",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:12}}>CREATOR PROFILE</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                {[["Handle","@ohPost · @oh.post"],["Credential","Top 500 Siege globally"],["Games","R6 Siege · Arc Raiders"],["Experience","11 years on PC"],["Strategy","Educational → Affiliates → PDF → Discord"],["Niche","Competitive FPS / PC Gaming"]].map(([l,v])=>(
                  <div key={l} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:8,padding:"9px 12px"}}>
                    <div style={{fontSize:7,color:"#333",letterSpacing:1,fontFamily:"'Share Tech Mono',monospace",marginBottom:3}}>{l.toUpperCase()}</div>
                    <div style={{fontSize:9,color:"#777",fontFamily:"'Share Tech Mono',monospace"}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{marginTop:16,padding:"10px 14px",background:"rgba(255,255,255,0.02)",borderRadius:8,fontSize:8,color:"#333",fontFamily:"'Share Tech Mono',monospace",lineHeight:1.8}}>
              Links auto-save on blur. They appear as quick-open buttons on Analytics and Overview. Stored locally in your browser.
            </div>
          </div>
        </div>
      )}

      {/* ── CONTENT ── */}
      <div style={{padding:"20px 22px",maxWidth:1320,margin:"0 auto"}}>
        {page==="guide"       && <PageGuide setPage={setPage}/> }
        {page==="overview"    && <PageOverview stats={stats} selectedPlatform={selectedPlatform} setSelectedPlatform={setSelectedPlatform} liveLog={liveLog} setPage={setPage} activeAgents={activeAgentCount} autopilotRunning={autopilotRunning} queueCount={vaultItems.filter(i=>i.column==="generated").length} socialLinks={socialLinks} setShowSettings={setShowSettings}/>}
        {page==="agents"      && <PageAgents runAgent={runAgent} agentResults={agentResults} runningAgents={runningAgents} setAgentResults={setAgentResults}/>}
        {page==="autopilot"   && <PageAutopilot niche={niche} setNiche={setNiche} nicheSet={nicheSet} setNicheSet={setNicheSet} autopilotRunning={autopilotRunning} startAutopilot={startAutopilot} stopAutopilot={stopAutopilot} activeJobs={activeJobs} setActiveJobs={setActiveJobs} queue={queue} setQueue={setQueue} totalGenerated={totalGenerated} daysPassed={daysPassed} currentWeek={currentWeek} callAutopilotClaude={callAutopilotClaude} vaultItems={vaultItems}/>}
        {page==="pipeline"    && <PagePipeline addToVault={addToVault} niche={niche}/>}
        {page==="shorts"      && <PageShorts addToVault={addToVault} niche={niche}/>}
        {page==="ideas"       && <PageIdeas niche={niche} addToVault={addToVault}/>}
        {page==="vault"       && <PageVault vaultItems={vaultItems} setVaultItems={setVaultItems}/>}
        {page==="analytics"   && <PageAnalytics socialLinks={socialLinks} setShowSettings={setShowSettings}/>}
        {page==="performance" && <PagePerformance/>}
        {page==="clips"       && <PageClips/>}
        {page==="keywords"    && <PageKeywords niche={niche} addToVault={addToVault}/>}
        {page==="recycle"     && <PageRecycle niche={niche} addToVault={addToVault}/>}
        {page==="collab"      && <PageCollab niche={niche} addToVault={addToVault}/>}
        {page==="audit"       && <PageAudit niche={niche} addToVault={addToVault}/>}
        {page==="deals"       && <PageDeals/>}
        {page==="money"       && <PageMoney runAgent={runAgent} runningAgents={runningAgents} niche={niche}/>}
        {page==="rate"        && <PageRateCalc niche={niche}/>}
        {page==="brand"       && <PageBrand niche={niche} addToVault={addToVault}/>}
        {page==="competitors" && <PageCompetitors niche={niche} addToVault={addToVault}/>}
        {page==="goals"       && <PageGoals/>}
        {page==="learn"       && <PageLearn niche={niche} addToVault={addToVault}/>}
        {page==="content"     && <PageContent setPage={setPage}/>}
        {page==="revenue"     && <PageRevenue stats={stats}/>}
      </div>
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
