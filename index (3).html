// PAGE: SPONSORSHIP & DEAL TRACKER
// ═══════════════════════════════════════════════════════════════════════════════

function PageDeals() {
  const [deals, setDeals]   = useState([]);
  const [adding, setAdding] = useState(false);
  const [form, setForm]     = useState({ brand:"", category:"", status:"prospecting", rate:"", platform:"all", notes:"", date:"" });
  const [pitchLoading, setPitchLoading] = useState(null);

  useEffect(()=>{ (async()=>{ try{ const r=await window.storage.get("deals"); if(r) setDeals(JSON.parse(r.value)); }catch(_){} })(); },[]);
  const persist = (d) => { try{ window.storage.set("deals",JSON.stringify(d)); }catch(_){}};

  const STATUS = {
    prospecting:{ label:"Prospecting", color:"#A78BFA" },
    outreach:   { label:"Outreach Sent",color:"#00c8ff" },
    negotiating:{ label:"Negotiating", color:"#F77737" },
    signed:     { label:"Signed ✓",    color:"#00ff88" },
    rejected:   { label:"Rejected",    color:"#ff4444" },
    completed:  { label:"Completed",   color:"#888"    },
  };

  const addDeal = () => {
    if(!form.brand) return;
    const entry = { ...form, id:"deal-"+Date.now(), rate:Number(form.rate)||0, createdAt:new Date().toLocaleDateString() };
    const next  = [entry, ...deals];
    setDeals(next); persist(next);
    setForm({ brand:"", category:"", status:"prospecting", rate:"", platform:"all", notes:"", date:"" });
    setAdding(false);
  };

  const updateStatus = (id, status) => {
    const next = deals.map(d=>d.id===id?{...d,status}:d);
    setDeals(next); persist(next);
  };

  const generatePitch = async (deal) => {
    setPitchLoading(deal.id);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:"You are a creator business development expert who writes concise, high-converting sponsorship pitch emails.",
          messages:[{role:"user", content:`Write a short sponsorship pitch email to ${deal.brand} (${deal.category||"brand"}) from a creator perspective. Platform: ${PLATFORMS[deal.platform]?.name||"all platforms"}. Rate we want: $${deal.rate||"TBD"}. Notes: ${deal.notes||"none"}. Keep it under 150 words. Be confident, specific about value, and include a clear CTA.`}]})
      });
      const data = await res.json();
      const pitch = data.content?.[0]?.text||"";
      const next  = deals.map(d=>d.id===deal.id?{...d,pitch}:d);
      setDeals(next); persist(next);
    } catch(e){}
    setPitchLoading(null);
  };

  const totalEarned   = deals.filter(d=>d.status==="completed").reduce((s,d)=>s+d.rate,0);
  const totalPipeline = deals.filter(d=>["negotiating","signed"].includes(d.status)).reduce((s,d)=>s+d.rate,0);

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:800, fontSize:20, letterSpacing:1}}>SPONSORSHIP TRACKER</div>
          <div style={{fontSize:9, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginTop:2}}>Track brand deals from prospect to payment</div>
        </div>
        <button onClick={()=>setAdding(a=>!a)} style={{padding:"8px 16px",
          background:adding?"rgba(255,68,68,0.1)":"rgba(255,255,255,0.06)",
          border:`1px solid ${adding?"rgba(255,68,68,0.25)":"rgba(255,255,255,0.1)"}`,
          borderRadius:8, color:adding?"#ff4444":"#fff",
          fontFamily:"'Share Tech Mono',monospace", fontSize:9, cursor:"pointer"}}>
          {adding?"CANCEL":"+ NEW DEAL"}
        </button>
      </div>

      <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:18}}>
        {[["TOTAL DEALS",deals.length,"#fff"],["PIPELINE","$"+totalPipeline.toLocaleString(),"#F77737"],["EARNED","$"+totalEarned.toLocaleString(),"#00ff88"]].map(([l,v,c])=>(
          <div key={l} style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:9, padding:"12px 14px"}}>
            <div style={{fontSize:7, color:"#333", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:4}}>{l}</div>
            <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:22, color:c}}>{v}</div>
          </div>
        ))}
      </div>

      {adding && (
        <div style={{background:"rgba(167,139,250,0.04)", border:"1px solid rgba(167,139,250,0.18)", borderRadius:12, padding:18, marginBottom:18, animation:"fadeIn .2s ease"}}>
          <div style={{fontSize:9, color:"#A78BFA", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:14}}>NEW DEAL</div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:10}}>
            <div><div style={LBL}>BRAND NAME</div><input value={form.brand} onChange={e=>setForm(f=>({...f,brand:e.target.value}))} placeholder="e.g. NordVPN" style={INP}/></div>
            <div><div style={LBL}>CATEGORY</div><input value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} placeholder="e.g. SaaS, Finance, Health" style={INP}/></div>
            <div><div style={LBL}>PLATFORM</div>
              <select value={form.platform} onChange={e=>setForm(f=>({...f,platform:e.target.value}))} style={INP}>
                {Object.entries(PLATFORMS).map(([k,v])=><option key={k} value={k} style={{background:"#111"}}>{v.name}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:10}}>
            <div><div style={LBL}>RATE ($)</div><input type="number" value={form.rate} onChange={e=>setForm(f=>({...f,rate:e.target.value}))} placeholder="500" style={INP}/></div>
            <div><div style={LBL}>STATUS</div>
              <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={INP}>
                {Object.entries(STATUS).map(([k,v])=><option key={k} value={k} style={{background:"#111"}}>{v.label}</option>)}
              </select>
            </div>
            <div><div style={LBL}>DEADLINE</div><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{...INP, colorScheme:"dark"}}/></div>
          </div>
          <div style={{display:"flex", gap:10}}>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes — contact info, deliverables, terms…" rows={2} style={{...INP, flex:1, resize:"none"}}/>
            <button onClick={addDeal} style={{padding:"0 24px", background:"linear-gradient(135deg,#A78BFA,#7C3AED)", border:"none", borderRadius:8, color:"#fff", fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:11, cursor:"pointer"}}>ADD</button>
          </div>
        </div>
      )}

      {deals.length===0 ? (
        <div style={{textAlign:"center", padding:"60px 0", color:"#2a2a2a"}}>
          <div style={{fontSize:36, opacity:.15, marginBottom:12}}>🤝</div>
          <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:16, letterSpacing:2}}>NO DEALS YET</div>
          <div style={{fontSize:9, fontFamily:"'Share Tech Mono',monospace", marginTop:8}}>Add your first prospect — Claude will write you a pitch email</div>
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:10}}>
          {deals.map(deal=>{
            const s=STATUS[deal.status]||STATUS.prospecting;
            const p=PLATFORMS[deal.platform]||PLATFORMS.all;
            return (
              <div key={deal.id} style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, overflow:"hidden"}}>
                <div style={{display:"flex", alignItems:"center", gap:12, padding:"12px 16px"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:4}}>
                      <span style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:14, color:"#fff"}}>{deal.brand}</span>
                      <span style={{fontSize:8, padding:"2px 8px", borderRadius:4, background:`${s.color}18`, color:s.color, border:`1px solid ${s.color}33`}}>{s.label}</span>
                      <Badge platform={deal.platform}/>
                    </div>
                    <div style={{fontSize:8, color:"#555", fontFamily:"'Share Tech Mono',monospace"}}>{deal.category} · {deal.date||deal.createdAt}</div>
                    {deal.notes && <div style={{fontSize:8, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginTop:4}}>{deal.notes}</div>}
                  </div>
                  <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:18, color:"#00ff88"}}>
                    {deal.rate?"$"+deal.rate.toLocaleString():"TBD"}
                  </div>
                  <div style={{display:"flex", gap:6, flexWrap:"wrap", maxWidth:260}}>
                    {Object.entries(STATUS).filter(([k])=>k!==deal.status).slice(0,3).map(([k,v])=>(
                      <button key={k} onClick={()=>updateStatus(deal.id,k)}
                        style={{padding:"3px 9px", background:`${v.color}10`, border:`1px solid ${v.color}25`,
                          borderRadius:4, color:v.color, fontSize:7, fontFamily:"'Share Tech Mono',monospace", cursor:"pointer"}}>
                        → {v.label}
                      </button>
                    ))}
                    <button onClick={()=>generatePitch(deal)} disabled={pitchLoading===deal.id}
                      style={{padding:"3px 9px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)",
                        borderRadius:4, color:"#888", fontSize:7, fontFamily:"'Share Tech Mono',monospace", cursor:"pointer"}}>
                      {pitchLoading===deal.id?"…":"✉ PITCH"}
                    </button>
                  </div>
                </div>
                {deal.pitch && (
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.05)", padding:"10px 16px", background:"rgba(255,255,255,0.01)"}}>
                    <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
                      <span style={{fontSize:8, color:"#A78BFA", letterSpacing:1}}>AI PITCH EMAIL</span>
                      <CopyBtn text={deal.pitch} small/>
                    </div>
                    <div style={{fontSize:10, color:"#aaa", fontFamily:"'Share Tech Mono',monospace", lineHeight:1.7, whiteSpace:"pre-wrap"}}>{deal.pitch}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const LBL = { fontSize:7, color:"#555", letterSpacing:1, fontFamily:"'Share Tech Mono',monospace", marginBottom:4 };

// ═══════════════════════════════════════════════════════════════════════════════
// PAGE: COMPETITOR INTELLIGENCE
// ═══════════════════════════════════════════════════════════════════════════════

function PageCompetitors({ niche, addToVault }) {
  const [competitors, setCompetitors] = useState([]);
  const [newName, setNewName]         = useState("");
  const [analysis, setAnalysis]       = useState("");
  const [loading, setLoading]         = useState(false);

  useEffect(()=>{ (async()=>{ try{ const r=await window.storage.get("competitors"); if(r) setCompetitors(JSON.parse(r.value)); }catch(_){} })(); },[]);
  const persist = (c) => { try{ window.storage.set("competitors",JSON.stringify(c)); }catch(_){} };

  const addCompetitor = () => {
    if(!newName.trim()) return;
    const next = [...competitors, { id:"comp-"+Date.now(), name:newName.trim(), platform:"all", notes:"", addedAt:new Date().toLocaleDateString() }];
    setCompetitors(next); persist(next); setNewName("");
  };

  const analyze = async () => {
    if(!competitors.length||loading) return;
    setLoading(true); setAnalysis("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:"You are a competitive intelligence analyst for content creators. Be specific and actionable.",
          messages:[{role:"user", content:`Analyze these competitors in the "${niche||"creator"}" niche: ${competitors.map(c=>c.name).join(", ")}

Provide: 1) What each is likely doing well (content strategy patterns common in this niche), 2) Gaps and opportunities they're probably missing, 3) 3 content angles you could own that they can't easily copy, 4) The fastest path to differentiation for a new creator entering this space, 5) One "blue ocean" content format that's underutilized in this niche.`}]})
      });
      const data = await res.json();
      const out = data.content?.[0]?.text||"";
      setAnalysis(out);
      addToVault({ id:"comp-"+Date.now(), agentName:"Competitor Intelligence", emoji:"🔍", platform:"all", topic:competitors.map(c=>c.name).join(", "), output:out, outputType:"intelligence" });
    } catch(e){ setAnalysis("Error: "+e.message); }
    setLoading(false);
  };

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:800, fontSize:20, letterSpacing:1, marginBottom:4}}>COMPETITOR INTELLIGENCE</div>

      <div style={{display:"grid", gridTemplateColumns:"300px 1fr", gap:16}}>
        <div>
          <div style={{display:"flex", gap:8, marginBottom:14}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCompetitor()}
              placeholder="Creator or channel name…" style={{...INP, flex:1}}/>
            <button onClick={addCompetitor} style={{padding:"0 14px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:7, color:"#fff", fontFamily:"'Share Tech Mono',monospace", fontSize:11, cursor:"pointer"}}>+</button>
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:7, marginBottom:14}}>
            {competitors.map(c=>(
              <div key={c.id} style={{display:"flex", alignItems:"center", gap:10, padding:"10px 12px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:8}}>
                <div style={{width:32, height:32, borderRadius:6, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:12, color:"#888"}}>
                  {c.name[0].toUpperCase()}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11, color:"#ccc", fontFamily:"'Share Tech Mono',monospace"}}>{c.name}</div>
                  <div style={{fontSize:8, color:"#444", fontFamily:"'Share Tech Mono',monospace"}}>Added {c.addedAt}</div>
                </div>
                <button onClick={()=>{ const next=competitors.filter(x=>x.id!==c.id); setCompetitors(next); persist(next); }}
                  style={{background:"none", border:"none", color:"#333", fontSize:14, cursor:"pointer"}}>×</button>
              </div>
            ))}
            {!competitors.length && <div style={{fontSize:9, color:"#2a2a2a", fontFamily:"'Share Tech Mono',monospace", textAlign:"center", padding:"20px 0"}}>No competitors added yet</div>}
          </div>
          <button onClick={analyze} disabled={!competitors.length||loading}
            style={{width:"100%", padding:"11px", background:competitors.length&&!loading?"linear-gradient(135deg,#00c8ff,#A78BFA)":"rgba(255,255,255,0.05)",
              border:"none", borderRadius:8, color:competitors.length&&!loading?"#000":"#333",
              fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:10, cursor:competitors.length?"pointer":"not-allowed", letterSpacing:.5}}>
            {loading?"ANALYZING…":"🔍 ANALYZE COMPETITION"}
          </button>
        </div>

        <div>
          {loading && (
            <div style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:300, gap:14}}>
              <div style={{width:28,height:28,border:"3px solid #00c8ff",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
              <div style={{fontSize:10, color:"#555", fontFamily:"'Share Tech Mono',monospace"}}>Analyzing competitive landscape…</div>
            </div>
          )}
          {analysis && !loading && (
            <div style={{background:"rgba(255,255,255,0.02)", border:"1px solid rgba(0,200,255,0.18)", borderRadius:12, overflow:"hidden"}}>
              <div style={{padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", justifyContent:"space-between", background:"rgba(0,200,255,0.04)"}}>
                <span style={{fontSize:9, color:"#00c8ff", fontFamily:"'Share Tech Mono',monospace", letterSpacing:2}}>COMPETITIVE ANALYSIS</span>
                <CopyBtn text={analysis} small/>
              </div>
              <div style={{padding:16, fontSize:11, color:"#bbb", fontFamily:"'Share Tech Mono',monospace", lineHeight:1.8, whiteSpace:"pre-wrap", maxHeight:520, overflowY:"auto"}}>
                <Typewriter text={analysis} speed={3}/>
              </div>
            </div>
          )}
          {!analysis && !loading && (
            <div style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:300, gap:12, textAlign:"center"}}>
              <div style={{fontSize:40, opacity:.1}}>🔍</div>
              <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:700, fontSize:16, color:"#1a1a1a", letterSpacing:2}}>ADD COMPETITORS</div>
              <div style={{fontSize:9, color:"#2a2a2a", fontFamily:"'Share Tech Mono',monospace", maxWidth:240, lineHeight:1.6}}>Add 3–5 creators in your niche and Claude will find the gaps you can own</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// PAGE: GOALS & KPI DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════

function PageGoals() {
  const MILESTONES = [
    { id:"f100",   label:"100 Followers",   platform:"tiktok",    target:100,   reward:"Proof of concept" },
    { id:"f1k",    label:"1K Followers",    platform:"tiktok",    target:1000,  reward:"TikTok Creator Fund eligible" },
    { id:"yt1k",   label:"1K YT Subs",     platform:"youtube",   target:1000,  reward:"YouTube Partner eligible" },
    { id:"f10k",   label:"10K Followers",   platform:"instagram", target:10000, reward:"Instagram monetization" },
    { id:"rev100", label:"First $100",      platform:"all",       target:100,   reward:"Proof of monetization", isRevenue:true },
    { id:"rev1k",  label:"First $1,000",    platform:"all",       target:1000,  reward:"Part-time income level", isRevenue:true },
    { id:"rev5k",  label:"$5K/Month",       platform:"all",       target:5000,  reward:"Full-time income level", isRevenue:true },
  ];

  const [progress, setProgress] = useState({});
  const [goals, setGoals]       = useState([]);
  const [checklist, setChecklist] = useState({});
  const [newGoal, setNewGoal]   = useState({ label:"", target:"", metric:"followers", platform:"tiktok" });

  const TODAY_TASKS = [
    "Post 3 TikToks (hooks ready in Vault)",
    "Reply to ALL comments within 1 hour",
    "Check trending sounds on TikTok Discover",
    "Run 1 autopilot agent for tomorrow's content",
    "Update performance tracker with yesterday's numbers",
    "Engage with 10 posts in your niche (comment, not just like)",
  ];

  useEffect(()=>{ (async()=>{
    try { const r=await window.storage.get("goals-data"); if(r){ const d=JSON.parse(r.value); setProgress(d.progress||{}); setGoals(d.goals||[]); setChecklist(d.checklist||{}); } }catch(_){}
  })(); },[]);

  const persist = (p,g,c) => { try{ window.storage.set("goals-data", JSON.stringify({progress:p,goals:g,checklist:c})); }catch(_){} };
  const updateProgress = (id,val) => { const n={...progress,[id]:Number(val)}; setProgress(n); persist(n,goals,checklist); };
  const toggleCheck = (k) => { const n={...checklist,[k]:!checklist[k]}; setChecklist(n); persist(progress,goals,n); };
  const addGoal = () => {
    if(!newGoal.label) return;
    const g=[...goals,{...newGoal,id:"goal-"+Date.now(),target:Number(newGoal.target)||0}];
    setGoals(g); persist(progress,g,checklist);
    setNewGoal({ label:"", target:"", metric:"followers", platform:"tiktok" });
  };

  const todayKey = new Date().toDateString();

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{fontFamily:"'Orbitron',sans-serif", fontWeight:800, fontSize:20, letterSpacing:1, marginBottom:4}}>GOALS & KPI DASHBOARD</div>
      <div style={{fontSize:9, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginBottom:18}}>Track milestones, daily habits, and custom targets</div>

      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:16}}>
        {/* Milestones */}
        <div>
          <div style={{fontSize:9, color:"#555", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:12}}>CREATOR MILESTONES</div>
          <div style={{display:"flex", flexDirection:"column", gap:8}}>
            {MILESTONES.map(m=>{
              const cur  = progress[m.id]||0;
              const pct  = Math.min(100, Math.round((cur/m.target)*100));
              const done = pct>=100;
              const p    = PLATFORMS[m.platform]||PLATFORMS.all;
              return (
                <div key={m.id} style={{background:done?"rgba(0,255,136,0.05)":"rgba(255,255,255,0.02)", border:`1px solid ${done?"rgba(0,255,136,0.2)":"rgba(255,255,255,0.06)"}`, borderRadius:9, padding:"12px 14px"}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
                    <div>
                      <span style={{fontSize:11, color:done?"#00ff88":"#ccc", fontFamily:"'Share Tech Mono',monospace"}}>{done?"✓ ":""}{m.label}</span>
                      <div style={{fontSize:8, color:"#444", fontFamily:"'Share Tech Mono',monospace", marginTop:2}}>{m.reward}</div>
                    </div>
                    <input type="number" value={progress[m.id]||""} onChange={e=>updateProgress(m.id,e.target.value)}
                      placeholder="0" style={{...INP, width:80, textAlign:"right", fontSize:11, padding:"4px 8px"}}/>
                  </div>
                  <div style={{display:"flex", alignItems:"center", gap:8}}>
                    <div style={{flex:1, height:4, background:"rgba(255,255,255,0.05)", borderRadius:2, overflow:"hidden"}}>
                      <div style={{height:"100%", width:`${pct}%`, borderRadius:2, transition:"width .5s ease", background:done?"#00ff88":`linear-gradient(90deg,${p.color},${p.accent})`}}/>
                    </div>
                    <span style={{fontSize:8, color:done?"#00ff88":"#555", fontFamily:"'Share Tech Mono',monospace", width:36, textAlign:"right"}}>{pct}%</span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Custom goal */}
          <div style={{marginTop:14, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:9, padding:14}}>
            <div style={{fontSize:8, color:"#555", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:10}}>ADD CUSTOM GOAL</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 80px", gap:7, marginBottom:7}}>
              <input value={newGoal.label} onChange={e=>setNewGoal(g=>({...g,label:e.target.value}))} placeholder="Goal label…" style={INP}/>
              <input type="number" value={newGoal.target} onChange={e=>setNewGoal(g=>({...g,target:e.target.value}))} placeholder="Target" style={INP}/>
            </div>
            <button onClick={addGoal} style={{width:"100%", padding:"8px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:7, color:"#888", fontFamily:"'Share Tech Mono',monospace", fontSize:9, cursor:"pointer"}}>+ ADD GOAL</button>
            {goals.map(g=>{
              const cur=progress[g.id]||0, pct=Math.min(100,Math.round((cur/g.target)*100));
              return (
                <div key={g.id} style={{marginTop:8, padding:"10px 12px", background:"rgba(255,255,255,0.03)", borderRadius:7}}>
                  <div style={{display:"flex", justifyContent:"space-between", marginBottom:5}}>
                    <span style={{fontSize:10, color:"#ccc", fontFamily:"'Share Tech Mono',monospace"}}>{g.label}</span>
                    <input type="number" value={progress[g.id]||""} onChange={e=>updateProgress(g.id,e.target.value)} placeholder="0"
                      style={{...INP, width:70, padding:"2px 6px", fontSize:10, textAlign:"right"}}/>
                  </div>
                  <div style={{height:3, background:"rgba(255,255,255,0.05)", borderRadius:2, overflow:"hidden"}}>
                    <div style={{height:"100%", width:`${pct}%`, background:"#A78BFA", borderRadius:2}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Daily checklist */}
        <div>
          <div style={{fontSize:9, color:"#555", letterSpacing:2, fontFamily:"'Share Tech Mono',monospace", marginBottom:12}}>
            TODAY'S CHECKLIST — {new Date().toLocaleDateString()}
          </div>
          <div style={{display:"flex", flexDirection:"column", gap:8}}>
            {TODAY_TASKS.map((task,i)=>{
              const key = todayKey+"-"+i;
              const done = checklist[key];
              return (
                <div key={i} onClick={()=>toggleCheck(key)}
                  style={{display:"flex", alignItems:"center", gap:12, padding:"12px 14px",
                    background:done?"rgba(0,255,136,0.05)":"rgba(255,255,255,0.02)",
                    border:`1px solid ${done?"rgba(0,255,136,0.18)":"rgba(255,255,255,0.06)"}`,
                    borderRadius:8, cursor:"pointer", transition:"all .2s"}}>
                  <div style={{width:18, height:18, borderRadius:4, flexShrink:0, border:`2px solid ${done?"#00ff88":"rgba(255,255,255,0.15)"}`,
                    background:done?"#00ff88":"transparent", display:"flex", alignItems:"center", justifyContent:"center", transition:"all .2s"}}>
                    {done && <span style={{fontSize:11, color:"#000", fontWeight:700, lineHeight:1}}>✓</span>}
                  </div>
                  <span style={{fontSize:10, color:done?"#555":"#ccc", fontFamily:"'Share Tech Mono',monospace", textDecoration:done?"line-through":"none", transition:"all .2s"}}>{task}</span>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:12, padding:"10px 14px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8}}>
            <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
              <span style={{fontSize:9, color:"#555", fontFamily:"'Share Tech Mono',monospace"}}>Today's progress</span>
              <span style={{fontSize:9, color:"#00ff88", fontFamily:"'Share Tech Mono',monospace"}}>
                {TODAY_TASKS.filter((_,i)=>checklist[todayKey+"-"+i]).length}/{TODAY_TASKS.length} done
              </span>
            </div>
            <div style={{height:5, background:"rgba(255,255,255,0.05)", borderRadius:3, overflow:"hidden"}}>
              <div style={{height:"100%", borderRadius:3, transition:"width .5s", background:"linear-gradient(90deg,#00ff88,#00c8ff)",
                width:`${(TODAY_TASKS.filter((_,i)=>checklist[todayKey+"-"+i]).length/TODAY_TASKS.length)*100}%`}}/>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// PAGE: VIDEO PRODUCTION PIPELINE
// ═══════════════════════════════════════════════════════════════════════════════
function PagePipeline({ addToVault, niche }) {
  const STAGES = [
    { id:"script",   label:"Script",    icon:"📝", color:"#A78BFA", tasks:["Run agent to generate script","Customise with personal examples","Add callout timestamps","Review hook — does it grab in 3s?"] },
    { id:"record",   label:"Record",    icon:"🎥", color:"#00c8ff", tasks:["Charge camera/phone","Set up clean background or gameplay capture","Record 2-3 takes","Record B-roll / gameplay overlay footage"] },
    { id:"edit",     label:"Edit",      icon:"✂️", color:"#F77737", tasks:["Cut dead air and filler words","Add captions/subtitles","Add b-roll, lower thirds","Add affiliate mention if applicable","Export: 1080p for YT, 1080x1920 for TT/IG"] },
    { id:"optimise", label:"Optimise",  icon:"🔍", color:"#00ff88", tasks:["Run Title & Thumbnail agent","Upload to YouTube with SEO description","Add chapters/timestamps","Add affiliate links to description","Set end screen + subscribe card"] },
    { id:"post",     label:"Post",      icon:"🚀", color:"#E1306C", tasks:["Post at optimal time (check schedule)","Cross-post clips to TikTok & IG","Pin comment with CTA","Share in Discord / Reddit community","Log in Performance Tracker"] },
  ];

  const [videos, setVideos] = useState([]);
  const [adding, setAdding] = useState(false);
  const [newTitle, setNewTitle] = useState("");
  const [checks, setChecks] = useState({});
  const [selected, setSelected] = useState(null);
  const [batchLoading, setBatchLoading] = useState(false);
  const [batchOutput, setBatchOutput] = useState("");

  useEffect(()=>{ (async()=>{ try{ const r=await window.storage.get("pipeline-data"); if(r){ const d=JSON.parse(r.value); setVideos(d.videos||[]); setChecks(d.checks||{}); } }catch(_){} })(); },[]);
  const persist = (v,c) => { try{ window.storage.set("pipeline-data",JSON.stringify({videos:v,checks:c})); }catch(_){}; };

  const addVideo = () => {
    if(!newTitle.trim()) return;
    const v = { id:"vid-"+Date.now(), title:newTitle.trim(), stage:"script", createdAt:new Date().toLocaleDateString() };
    const next = [v,...videos]; setVideos(next); persist(next,checks); setNewTitle(""); setAdding(false); setSelected(v.id);
  };
  const moveStage = (id, dir) => {
    const ids = STAGES.map(s=>s.id);
    const next = videos.map(v=>{ if(v.id!==id) return v; const i=ids.indexOf(v.stage); const ni=Math.max(0,Math.min(ids.length-1,i+dir)); return {...v,stage:ids[ni]}; });
    setVideos(next); persist(next,checks);
  };
  const toggleCheck = (key) => { const n={...checks,[key]:!checks[key]}; setChecks(n); persist(videos,n); };
  const deleteVideo = (id) => { const next=videos.filter(v=>v.id!==id); setVideos(next); persist(next,checks); if(selected===id) setSelected(null); };

  const batchPlan = async () => {
    setBatchLoading(true); setBatchOutput("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:"You are a YouTube production manager for a competitive gaming creator. Be specific and tactical.",
          messages:[{role:"user",content:`I'm a Top 500 Siege player creating educational FPS content. Plan a batch recording session where I record 5 videos in one day for the niche: "${niche||"competitive Siege educational content"}". Give me: 1) The 5 best video topics to batch (mix of Siege breakdowns, operator guides, Arc Raiders), 2) Shooting order (warm-up to complex), 3) B-roll/capture footage list, 4) One-day timeline (9am–5pm), 5) What to prep the night before.`}]})});
      const data = await res.json();
      const out = data.content?.[0]?.text||"";
      setBatchOutput(out);
      addToVault({id:"pipeline-"+Date.now(),agentName:"Batch Planner",emoji:"🎥",platform:"youtube",topic:"Batch recording plan",output:out,outputType:"plan"});
    } catch(e){ setBatchOutput("Error: "+e.message); }
    setBatchLoading(false);
  };

  const selectedVideo = videos.find(v=>v.id===selected);
  const selectedStage = selectedVideo ? STAGES.find(s=>s.id===selectedVideo.stage) : null;

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:20,letterSpacing:1}}>VIDEO PIPELINE</div>
          <div style={{fontSize:9,color:"#444",fontFamily:"'Share Tech Mono',monospace",marginTop:2}}>Track every video from script to posted — never let ideas die in limbo</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={batchPlan} disabled={batchLoading} style={{padding:"8px 14px",background:batchLoading?"rgba(255,255,255,0.04)":"rgba(0,200,255,0.08)",border:"1px solid rgba(0,200,255,0.2)",borderRadius:8,color:batchLoading?"#333":"#00c8ff",fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:"pointer"}}>
            {batchLoading?"PLANNING…":"📋 BATCH SESSION PLAN"}
          </button>
          <button onClick={()=>setAdding(a=>!a)} style={{padding:"8px 14px",background:adding?"rgba(255,68,68,0.08)":"rgba(255,255,255,0.06)",border:`1px solid ${adding?"rgba(255,68,68,0.2)":"rgba(255,255,255,0.1)"}`,borderRadius:8,color:adding?"#ff4444":"#fff",fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:"pointer"}}>
            {adding?"CANCEL":"+ NEW VIDEO"}
          </button>
        </div>
      </div>

      {adding && (
        <div style={{background:"rgba(167,139,250,0.05)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:10,padding:16,marginBottom:16,display:"flex",gap:10,animation:"fadeIn .2s ease"}}>
          <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addVideo()} placeholder="Video title or topic…" style={{...INP,flex:1}}/>
          <button onClick={addVideo} style={{padding:"0 20px",background:"linear-gradient(135deg,#A78BFA,#7C3AED)",border:"none",borderRadius:8,color:"#fff",fontFamily:"'Orbitron',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer"}}>ADD</button>
        </div>
      )}

      {batchOutput && (
        <div style={{background:"rgba(0,200,255,0.04)",border:"1px solid rgba(0,200,255,0.18)",borderRadius:10,marginBottom:16,overflow:"hidden"}}>
          <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",background:"rgba(0,200,255,0.04)"}}>
            <span style={{fontSize:9,color:"#00c8ff",fontFamily:"'Share Tech Mono',monospace",letterSpacing:2}}>BATCH SESSION PLAN</span>
            <div style={{display:"flex",gap:8}}><CopyBtn text={batchOutput} small/><button onClick={()=>setBatchOutput("")} style={{background:"none",border:"none",color:"#333",fontSize:12,cursor:"pointer"}}>×</button></div>
          </div>
          <div style={{padding:14,fontSize:10,color:"#bbb",fontFamily:"'Share Tech Mono',monospace",lineHeight:1.8,whiteSpace:"pre-wrap",maxHeight:300,overflowY:"auto"}}><Typewriter text={batchOutput} speed={2}/></div>
        </div>
      )}

      {/* Pipeline kanban */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
        {STAGES.map(stage=>{
          const items = videos.filter(v=>v.stage===stage.id);
          return (
            <div key={stage.id}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,padding:"7px 10px",background:"rgba(255,255,255,0.02)",border:`1px solid ${stage.color}22`,borderRadius:7}}>
                <span style={{fontSize:12}}>{stage.icon}</span>
                <span style={{fontFamily:"'Orbitron',sans-serif",fontWeight:700,fontSize:10,color:stage.color,flex:1,letterSpacing:.5}}>{stage.label}</span>
                <span style={{fontSize:9,color:"#444",background:"rgba(255,255,255,0.05)",padding:"1px 6px",borderRadius:3}}>{items.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {items.map(v=>(
                  <div key={v.id} onClick={()=>setSelected(selected===v.id?null:v.id)} style={{padding:"10px 11px",background:selected===v.id?`${stage.color}12`:"rgba(255,255,255,0.025)",border:`1px solid ${selected===v.id?stage.color+"44":"rgba(255,255,255,0.07)"}`,borderRadius:8,cursor:"pointer",transition:"all .2s"}}>
                    <div style={{fontSize:10,color:"#ddd",fontFamily:"'Share Tech Mono',monospace",marginBottom:6,lineHeight:1.4}}>{v.title}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:7,color:"#333",fontFamily:"'Share Tech Mono',monospace"}}>{v.createdAt}</span>
                      <div style={{display:"flex",gap:3}}>
                        <button onClick={e=>{e.stopPropagation();moveStage(v.id,-1);}} style={{background:"none",border:"1px solid rgba(255,255,255,0.08)",borderRadius:3,color:"#444",fontSize:8,padding:"1px 5px",cursor:"pointer"}}>←</button>
                        <button onClick={e=>{e.stopPropagation();moveStage(v.id,1);}} style={{background:"none",border:"1px solid rgba(255,255,255,0.08)",borderRadius:3,color:"#444",fontSize:8,padding:"1px 5px",cursor:"pointer"}}>→</button>
                      </div>
                    </div>
                  </div>
                ))}
                {items.length===0 && <div style={{padding:"16px 10px",textAlign:"center",border:"1px dashed rgba(255,255,255,0.05)",borderRadius:7,fontSize:8,color:"#1e1e1e",fontFamily:"'Share Tech Mono',monospace"}}>empty</div>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Checklist for selected video */}
      {selectedVideo && selectedStage && (
        <div style={{background:`${selectedStage.color}08`,border:`1px solid ${selectedStage.color}22`,borderRadius:10,padding:16,animation:"fadeIn .2s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:14,color:"#fff"}}>{selectedVideo.title}</div>
              <div style={{fontSize:9,color:selectedStage.color,fontFamily:"'Share Tech Mono',monospace",marginTop:2}}>{selectedStage.icon} {selectedStage.label.toUpperCase()} STAGE CHECKLIST</div>
            </div>
            <button onClick={()=>deleteVideo(selectedVideo.id)} style={{background:"none",border:"1px solid rgba(255,68,68,0.2)",borderRadius:6,color:"#ff4444",fontSize:9,padding:"4px 10px",cursor:"pointer",fontFamily:"'Share Tech Mono',monospace"}}>DELETE</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {selectedStage.tasks.map((task,i)=>{
              const key=`${selectedVideo.id}-${selectedStage.id}-${i}`;
              const done=checks[key];
              return (
                <div key={i} onClick={()=>toggleCheck(key)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:done?"rgba(0,255,136,0.06)":"rgba(255,255,255,0.03)",border:`1px solid ${done?"rgba(0,255,136,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:8,cursor:"pointer",transition:"all .2s"}}>
                  <div style={{width:16,height:16,borderRadius:4,flexShrink:0,border:`2px solid ${done?selectedStage.color:"rgba(255,255,255,0.15)"}`,background:done?selectedStage.color+"33":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {done && <span style={{color:selectedStage.color,fontSize:9,fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontSize:9,color:done?"#ccc":"#666",fontFamily:"'Share Tech Mono',monospace",textDecoration:done?"line-through":"none",lineHeight:1.4}}>{task}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {videos.length===0 && !adding && (
        <div style={{textAlign:"center",padding:"60px 0",color:"#1a1a1a"}}>
          <div style={{fontSize:40,opacity:.12,marginBottom:12}}>🎥</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:18,letterSpacing:2}}>NO VIDEOS IN PIPELINE</div>
          <div style={{fontSize:9,fontFamily:"'Share Tech Mono',monospace",marginTop:8,color:"#2a2a2a"}}>Add a video idea and track it all the way to posted</div>
        </div>
      )}
    </div>
  );
}

// PAGE: REAL ANALYTICS (manual logger + growth tracker)
// ═══════════════════════════════════════════════════════════════════════════════
function PageAnalytics({ socialLinks={}, setShowSettings=()=>{} }) {
  const [snapshots, setSnapshots] = useState([]);
  const [form, setForm] = useState({date:new Date().toISOString().split("T")[0],yt_subs:"",yt_views:"",yt_ctr:"",tt_followers:"",tt_views:"",ig_followers:"",ig_reach:"",revenue:""});
  const [adding, setAdding] = useState(false);
  const [insight, setInsight] = useState(""); const [loading, setLoading] = useState(false);
  const [showStart, setShowStart] = useState(false);

  useEffect(()=>{ (async()=>{ try{ const r=await window.storage.get("analytics-snaps"); if(r) setSnapshots(JSON.parse(r.value)); else setShowStart(true); }catch(_){ setShowStart(true); } })(); },[]);
  const persist = (s) => { try{ window.storage.set("analytics-snaps",JSON.stringify(s)); }catch(_){} };

  const addSnapshot = () => {
    const entry = { id:"snap-"+Date.now(), ...form, yt_subs:Number(form.yt_subs)||0, yt_views:Number(form.yt_views)||0, yt_ctr:Number(form.yt_ctr)||0, tt_followers:Number(form.tt_followers)||0, tt_views:Number(form.tt_views)||0, ig_followers:Number(form.ig_followers)||0, ig_reach:Number(form.ig_reach)||0, revenue:Number(form.revenue)||0 };
    const next = [...snapshots, entry].sort((a,b)=>a.date.localeCompare(b.date));
    setSnapshots(next); persist(next);
    setForm({date:new Date().toISOString().split("T")[0],yt_subs:"",yt_views:"",yt_ctr:"",tt_followers:"",tt_views:"",ig_followers:"",ig_reach:"",revenue:""});
    setAdding(false);
  };

  const getInsight = async () => {
    if(snapshots.length<2||loading) return;
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:"You are a data analyst for a gaming content creator. Identify real growth trends from weekly snapshots.",
          messages:[{role:"user",content:`Analyze this weekly analytics data for a Top 500 Siege educational creator:
${JSON.stringify(snapshots,null,2)}

Tell me: 1) Which platform is growing fastest and why, 2) Is CTR improving? What does that mean? 3) Which week had the best content? 4) What's the trajectory to 1M total followers — at current rate, when? 5) The single most important thing to change this week. Be specific with numbers.`}]})});
      const data = await res.json();
      setInsight(data.content?.[0]?.text||"");
    } catch(e){ setInsight("Error: "+e.message); }
    setLoading(false);
  };

  const latest = snapshots[snapshots.length-1]||{};
  const prev = snapshots[snapshots.length-2]||{};
  const delta = (a,b) => a&&b ? ((a-b)/b*100).toFixed(1) : null;
  const totalFollowers = (Number(latest.yt_subs)||0)+(Number(latest.tt_followers)||0)+(Number(latest.ig_followers)||0);
  const MILLION = 1000000;
  const pctTo1M = Math.min(100,(totalFollowers/MILLION*100)).toFixed(2);

  return (
    <div style={{animation:"fadeIn .25s ease"}}>

      {/* ── Social links quick-access bar ── */}
      {(()=>{
        const meta={youtube:{label:"YouTube",icon:"▶",color:"#FF3A3A"},tiktok:{label:"TikTok",icon:"♪",color:"#00F2EA"},instagram:{label:"Instagram",icon:"◉",color:"#E1306C"},twitter:{label:"Twitter/X",icon:"𝕏",color:"#1DA1F2"},twitch:{label:"Twitch",icon:"◈",color:"#9146FF"}};
        const hasLinks=socialLinks&&Object.values(socialLinks).some(v=>v);
        return (
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18,padding:"10px 16px",background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,flexWrap:"wrap"}}>
            <span style={{fontSize:8,color:"#333",fontFamily:"'Share Tech Mono',monospace",letterSpacing:1,marginRight:4,flexShrink:0}}>YOUR CHANNELS →</span>
            {hasLinks
              ? Object.entries(socialLinks).filter(([,v])=>v).map(([k,v])=>{
                  const m=meta[k]; if(!m) return null;
                  return <a key={k} href={v} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",background:`${m.color}10`,border:`1px solid ${m.color}25`,borderRadius:7,color:m.color,fontSize:9,fontFamily:"'Share Tech Mono',monospace",textDecoration:"none",letterSpacing:.3,flexShrink:0}}><span>{m.icon}</span>{m.label} ↗</a>;
                })
              : <button onClick={()=>setShowSettings(true)} style={{padding:"5px 14px",background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:7,color:"#A78BFA",fontSize:9,fontFamily:"'Share Tech Mono',monospace",cursor:"pointer"}}>⚙ Add your channel links in Settings →</button>
            }
            {hasLinks&&<button onClick={()=>setShowSettings(true)} style={{marginLeft:"auto",padding:"4px 10px",background:"none",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,color:"#333",fontSize:8,fontFamily:"'Share Tech Mono',monospace",cursor:"pointer",flexShrink:0}}>⚙ edit</button>}
          </div>
        );
      })()}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:20,letterSpacing:1}}>REAL ANALYTICS</div>
          <div style={{fontSize:9,color:"#444",fontFamily:"'Share Tech Mono',monospace",marginTop:2}}>Log your real numbers weekly — Claude tracks the trend toward 1M</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {snapshots.length>=2 && <button onClick={getInsight} disabled={loading} style={{padding:"8px 14px",background:loading?"rgba(255,255,255,0.04)":"linear-gradient(135deg,#00ff88,#00c8ff)",border:"none",borderRadius:8,color:loading?"#444":"#000",fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:"pointer"}}>{loading?"ANALYZING…":"🧠 AI TREND ANALYSIS"}</button>}
          <button onClick={()=>setAdding(a=>!a)} style={{padding:"8px 14px",background:adding?"rgba(255,68,68,0.08)":"rgba(255,255,255,0.06)",border:`1px solid ${adding?"rgba(255,68,68,0.2)":"rgba(255,255,255,0.1)"}`,borderRadius:8,color:adding?"#ff4444":"#fff",fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:"pointer"}}>{adding?"CANCEL":"+ LOG THIS WEEK"}</button>
        </div>
      </div>

      {snapshots.length===0 && !adding && (
        <div style={{background:"rgba(0,255,136,0.05)",border:"1px solid rgba(0,255,136,0.2)",borderRadius:12,padding:"20px 24px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:16,color:"#00ff88",marginBottom:6}}>LOG YOUR DAY 1 NUMBERS</div>
            <div style={{fontSize:10,color:"#555",fontFamily:"'Share Tech Mono',monospace",lineHeight:1.7}}>
              Even if it's 0 subscribers and 0 views — log it now.<br/>
              Every week you'll see exactly how far you've come. That's the motivation.
            </div>
          </div>
          <button onClick={()=>setAdding(true)} style={{padding:"12px 24px",background:"linear-gradient(135deg,#00ff88,#00c8ff)",border:"none",borderRadius:8,color:"#000",fontFamily:"'Orbitron',sans-serif",fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,marginLeft:20}}>LOG WEEK 1 →</button>
        </div>
      )}
      <div style={{background:"rgba(0,255,136,0.04)",border:"1px solid rgba(0,255,136,0.15)",borderRadius:11,padding:"14px 18px",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{fontSize:8,color:"#00ff88",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:2}}>ROAD TO 1,000,000</div>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:28,color:"#fff"}}>{totalFollowers.toLocaleString()} <span style={{fontSize:12,color:"#555"}}>/ 1,000,000</span></div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:32,color:"#00ff88"}}>{pctTo1M}%</div>
            <div style={{fontSize:8,color:"#555",fontFamily:"'Share Tech Mono',monospace"}}>ACROSS ALL PLATFORMS</div>
          </div>
        </div>
        <div style={{height:8,background:"rgba(255,255,255,0.05)",borderRadius:4,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pctTo1M}%`,background:"linear-gradient(90deg,#00ff88,#00c8ff)",borderRadius:4,transition:"width .8s ease"}}/>
        </div>
      </div>

      {/* Summary stats */}
      {Object.keys(latest).length > 2 && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
          {[
            {l:"YT SUBSCRIBERS",v:latest.yt_subs,d:delta(latest.yt_subs,prev.yt_subs),c:"#FF3A3A"},
            {l:"TT FOLLOWERS",v:latest.tt_followers,d:delta(latest.tt_followers,prev.tt_followers),c:"#00F2EA"},
            {l:"YT CTR",v:latest.yt_ctr+"%",d:delta(latest.yt_ctr,prev.yt_ctr),c:"#F77737"},
            {l:"WEEKLY REVENUE",v:"$"+(latest.revenue||0),d:delta(latest.revenue,prev.revenue),c:"#00ff88"},
          ].map(s=>(
            <div key={s.l} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:9,padding:"12px 14px"}}>
              <div style={{fontSize:7,color:"#333",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:4}}>{s.l}</div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:20,color:s.c}}>{Number(s.v)||s.v}</div>
              {s.d!==null && <div style={{fontSize:8,color:Number(s.d)>=0?"#00ff88":"#ff4444",fontFamily:"'Share Tech Mono',monospace",marginTop:3}}>{Number(s.d)>=0?"+":""}{s.d}% WoW</div>}

// PAGE: SCRIPT → SHORTS CONVERTER
// ═══════════════════════════════════════════════════════════════════════════════
function PageShorts({ addToVault, niche }) {
  const [script, setScript] = useState("");
  const [shorts, setShorts] = useState([]);
  const [loading, setLoading] = useState(false);
  const [hookLoading, setHookLoading] = useState(false);
  const [hooks, setHooks] = useState([]);
  const [hookTopic, setHookTopic] = useState("");

  const extractShorts = async () => {
    if(!script.trim()||loading) return;
    setLoading(true); setShorts([]);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:"You are a YouTube Shorts and TikTok expert for a competitive gaming creator. You extract the best 60-second moments from long-form scripts and write standalone Short scripts. Return ONLY valid JSON.",
          messages:[{role:"user",content:`Extract the 3 best YouTube Shorts (60 seconds each) from this long-form script. Each Short should stand alone, start with a strong hook, and give one clear value. Return ONLY a JSON array:
[{"title":"...","hook":"...","script":"...","platform":"tiktok|youtube","angle":"why this works as a Short"}]

LONG-FORM SCRIPT:
${script.slice(0,3000)}`}]})});
      const data = await res.json();
      const text = data.content?.[0]?.text||"[]";
      const clean = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      if(Array.isArray(parsed)) {
        setShorts(parsed);
        parsed.forEach((s,i) => addToVault({id:"short-"+Date.now()+i,agentName:"Shorts Extractor",emoji:"✂️",platform:s.platform||"tiktok",topic:s.title,output:`TITLE: ${s.title}
HOOK: ${s.hook}

${s.script}

ANGLE: ${s.angle}`,outputType:"short"}));
      }
    } catch(e){ setShorts([]); }
    setLoading(false);
  };

  const generateHooks = async () => {
    if(!hookTopic.trim()||hookLoading) return;
    setHookLoading(true); setHooks([]);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
          system:"You are a viral gaming TikTok hook writer. Return ONLY a JSON array of hooks.",
          messages:[{role:"user",content:`Write 8 high-converting TikTok/Shorts hooks for a clip about: "${hookTopic}". Creator is Top 500 Siege globally. Mix angles: educational, skill-flex, curiosity gap, story. Format: [{"hook":"...","angle":"...","score":8}] — score 1-10. ONLY JSON.`}]})});
      const data = await res.json();
      const text = data.content?.[0]?.text||"[]";
      const clean = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      if(Array.isArray(parsed)) setHooks(parsed);
    } catch(e){}
    setHookLoading(false);
  };

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:20,letterSpacing:1,marginBottom:4}}>SHORTS FACTORY</div>
      <div style={{fontSize:9,color:"#444",fontFamily:"'Share Tech Mono',monospace",marginBottom:18}}>Paste a long YouTube script → auto-extract 3 best Shorts. Or generate viral hooks for any clip.</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div>
          <div style={{fontSize:9,color:"#A78BFA",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:10}}>SCRIPT → 3 SHORTS</div>
          <textarea value={script} onChange={e=>setScript(e.target.value)} rows={12} placeholder="Paste your full YouTube script here — Claude finds the 3 best 60-second moments and rewrites them as standalone Shorts scripts ready to record…" style={{...INP,resize:"none",lineHeight:1.7,marginBottom:10}}/>
          <button onClick={extractShorts} disabled={loading||!script.trim()} style={{width:"100%",padding:"11px",background:loading?"rgba(255,255,255,0.04)":"linear-gradient(135deg,#A78BFA,#00c8ff)",border:"none",borderRadius:8,color:loading?"#444":"#000",fontFamily:"'Orbitron',sans-serif",fontWeight:700,fontSize:10,cursor:loading?"not-allowed":"pointer",letterSpacing:.5}}>
            {loading?"EXTRACTING SHORTS…":"✂️ EXTRACT 3 SHORTS"}
          </button>

          <div style={{marginTop:20,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:18}}>
            <div style={{fontSize:9,color:"#00F2EA",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:10}}>HOOK GENERATOR (no script needed)</div>
            <input value={hookTopic} onChange={e=>setHookTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&generateHooks()} placeholder="Describe a clip — e.g. '1v3 clutch on Coastline with Ash'" style={{...INP,marginBottom:8}}/>
            <button onClick={generateHooks} disabled={hookLoading||!hookTopic.trim()} style={{width:"100%",padding:"10px",background:hookLoading?"rgba(255,255,255,0.04)":"rgba(0,242,234,0.08)",border:"1px solid rgba(0,242,234,0.2)",borderRadius:8,color:hookLoading?"#444":"#00F2EA",fontFamily:"'Orbitron',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",letterSpacing:.5}}>
              {hookLoading?"WRITING HOOKS…":"⚡ GENERATE 8 HOOKS"}
            </button>
          </div>
        </div>

        <div style={{overflowY:"auto",maxHeight:680}}>
          {loading && <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:200,gap:12}}>
            <div style={{width:28,height:28,border:"3px solid #A78BFA",borderTopColor:"transparent",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
            <div style={{fontSize:10,color:"#555",fontFamily:"'Share Tech Mono',monospace"}}>Extracting the best moments…</div>
          </div>}

          {shorts.length>0 && (
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{fontSize:9,color:"#A78BFA",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:4}}>3 SHORTS EXTRACTED → SAVED TO VAULT</div>
              {shorts.map((s,i)=>(
                <div key={i} style={{background:"rgba(167,139,250,0.05)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:10,overflow:"hidden"}}>
                  <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(167,139,250,0.05)"}}>
                    <div>
                      <div style={{fontSize:11,color:"#fff",fontFamily:"'Share Tech Mono',monospace",fontWeight:600}}>{s.title}</div>
                      <div style={{fontSize:8,color:"#555",fontFamily:"'Share Tech Mono',monospace",marginTop:2}}>{s.angle}</div>
                    </div>
                    <CopyBtn text={`${s.hook}

${s.script}`} small/>
                  </div>
                  <div style={{padding:12}}>
                    <div style={{fontSize:10,color:"#A78BFA",fontFamily:"'Share Tech Mono',monospace",marginBottom:6,fontStyle:"italic"}}>"{s.hook}"</div>
                    <div style={{fontSize:9,color:"#777",fontFamily:"'Share Tech Mono',monospace",lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:120,overflowY:"auto"}}>{s.script}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {hooks.length>0 && (
            <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:shorts.length>0?16:0}}>
              <div style={{fontSize:9,color:"#00F2EA",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:4}}>8 HOOKS GENERATED</div>
              {hooks.map((h,i)=>(
                <div key={i} style={{background:"rgba(0,242,234,0.04)",border:"1px solid rgba(0,242,234,0.15)",borderRadius:9,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
                  <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:18,color:h.score>=8?"#00ff88":h.score>=6?"#F77737":"#ff4444",minWidth:28}}>{h.score}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:"#ddd",fontFamily:"'Share Tech Mono',monospace",marginBottom:4,lineHeight:1.5}}>{h.hook}</div>
                    <div style={{fontSize:8,color:"#444",fontFamily:"'Share Tech Mono',monospace"}}>{h.angle}</div>
                  </div>
                  <CopyBtn text={h.hook} small/>
                </div>
              ))}
            </div>
          )}

          {!loading && shorts.length===0 && hooks.length===0 && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:12,textAlign:"center"}}>
              <div style={{fontSize:40,opacity:.1}}>✂️</div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:700,fontSize:14,color:"#1a1a1a",letterSpacing:2}}>PASTE A SCRIPT OR DESCRIBE A CLIP</div>
              <div style={{fontSize:9,color:"#2a2a2a",fontFamily:"'Share Tech Mono',monospace",maxWidth:240,lineHeight:1.6}}>One long-form script becomes 3 Shorts. One clip description becomes 8 hooks. Record once, post everywhere.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// PAGE: COLLAB RADAR
// ═══════════════════════════════════════════════════════════════════════════════
function PageCollab({ niche, addToVault }) {
  const [collabs, setCollabs] = useState([]);
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({name:"",channel:"",platform:"youtube",niche_overlap:"",subs:"",status:"prospect",notes:""});
  const [pitching, setPitching] = useState(null);
  const [pitchOutput, setPitchOutput] = useState({});
  const [strategy, setStrategy] = useState(""); const [stratLoading, setStratLoading] = useState(false);

  useEffect(()=>{ (async()=>{ try{ const r=await window.storage.get("collab-data"); if(r) setCollabs(JSON.parse(r.value)); }catch(_){} })(); },[]);
  const persist = (c) => { try{ window.storage.set("collab-data",JSON.stringify(c)); }catch(_){} };

  const STATUS = { prospect:{label:"Prospect",color:"#A78BFA"}, research:{label:"Researching",color:"#00c8ff"}, reached_out:{label:"Reached Out",color:"#F77737"}, in_talks:{label:"In Talks",color:"#00ff88"}, done:{label:"Done ✓",color:"#888"} };

  const addCollab = () => {
    if(!form.name.trim()) return;
    const entry = {...form,id:"collab-"+Date.now(),createdAt:new Date().toLocaleDateString()};
    const next = [entry,...collabs]; setCollabs(next); persist(next);
    setForm({name:"",channel:"",platform:"youtube",niche_overlap:"",subs:"",status:"prospect",notes:""}); setAdding(false);
  };
  const updateStatus = (id,status) => { const next=collabs.map(c=>c.id===id?{...c,status}:c); setCollabs(next); persist(next); };

  const generatePitch = async (collab) => {
    setPitching(collab.id);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
          system:"You write creator collab pitch DMs that feel genuine, not transactional. Specific to gaming creators.",
          messages:[{role:"user",content:`Write a collab pitch DM to ${collab.name} (${collab.subs||"unknown"} subs, niche: ${collab.niche_overlap||"gaming"}) from a Top 500 Rainbow Six Siege educational creator. Context: ${collab.notes||"no extra context"}. Niche overlap: ${collab.niche_overlap}. Platform: ${collab.platform}. Keep it under 120 words. Suggest a specific collab format that benefits both audiences. Sound like a real person, not a brand.`}]})});
      const data = await res.json();
      const out = data.content?.[0]?.text||"";
      setPitchOutput(prev=>({...prev,[collab.id]:out}));
      addToVault({id:"collab-"+Date.now(),agentName:"Collab Pitch",emoji:"🤝",platform:collab.platform,topic:`Pitch to ${collab.name}`,output:out,outputType:"pitch"});
    } catch(e){}
    setPitching(null);
  };

  const getStrategy = async () => {
    setStratLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
          system:"You are a creator growth strategist. Be specific about gaming creator collabs.",
          messages:[{role:"user",content:`I'm a Top 500 Siege educational creator with "${niche||"competitive FPS"}" niche. Give me: 1) 5 types of creators I should collab with (specific, not generic), 2) Best collab formats for gaming educational content, 3) Where to find collab partners (Reddit, Discord servers, YouTube), 4) How to structure the ask so both audiences win, 5) What to post after the collab to maximize the sub gain.`}]})});
      const data = await res.json();
      setStrategy(data.content?.[0]?.text||"");
    } catch(e){ setStrategy("Error"); }
    setStratLoading(false);
  };

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:20,letterSpacing:1}}>COLLAB RADAR</div>
          <div style={{fontSize:9,color:"#444",fontFamily:"'Share Tech Mono',monospace",marginTop:2}}>Collabs are the fastest growth lever that doesn't depend on the algorithm</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={getStrategy} disabled={stratLoading} style={{padding:"8px 14px",background:stratLoading?"rgba(255,255,255,0.04)":"rgba(0,200,255,0.08)",border:"1px solid rgba(0,200,255,0.2)",borderRadius:8,color:stratLoading?"#333":"#00c8ff",fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:"pointer"}}>{stratLoading?"THINKING…":"🧠 COLLAB STRATEGY"}</button>
          <button onClick={()=>setAdding(a=>!a)} style={{padding:"8px 14px",background:adding?"rgba(255,68,68,0.08)":"rgba(255,255,255,0.06)",border:`1px solid ${adding?"rgba(255,68,68,0.2)":"rgba(255,255,255,0.1)"}`,borderRadius:8,color:adding?"#ff4444":"#fff",fontFamily:"'Share Tech Mono',monospace",fontSize:9,cursor:"pointer"}}>{adding?"CANCEL":"+ ADD CREATOR"}</button>
        </div>
      </div>

      {strategy && (
        <div style={{background:"rgba(0,200,255,0.04)",border:"1px solid rgba(0,200,255,0.18)",borderRadius:10,overflow:"hidden",marginBottom:16}}>
          <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",background:"rgba(0,200,255,0.04)"}}>
            <span style={{fontSize:9,color:"#00c8ff",fontFamily:"'Share Tech Mono',monospace",letterSpacing:2}}>COLLAB STRATEGY</span>
            <div style={{display:"flex",gap:8}}><CopyBtn text={strategy} small/><button onClick={()=>setStrategy("")} style={{background:"none",border:"none",color:"#333",fontSize:12,cursor:"pointer"}}>×</button></div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
            <div><div style={LBL}>CREATOR NAME</div><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. KingGeorge" style={INP}/></div>
            <div><div style={LBL}>CHANNEL / HANDLE</div><input value={form.channel} onChange={e=>setForm(f=>({...f,channel:e.target.value}))} placeholder="@channel" style={INP}/></div>

            <div><div style={LBL}>NICHE OVERLAP</div><input value={form.niche_overlap} onChange={e=>setForm(f=>({...f,niche_overlap:e.target.value}))} placeholder="e.g. Siege, FPS, ranked improvement" style={INP}/></div>
            <div><div style={LBL}>APPROX SUBSCRIBERS</div><input value={form.subs} onChange={e=>setForm(f=>({...f,subs:e.target.value}))} placeholder="e.g. 50K" style={INP}/></div>

          <div style={{display:"flex",gap:10}}>
            <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes — what they cover, why they'd want to collab, any connection…" rows={2} style={{...INP,flex:1,resize:"none"}}/>
            <button onClick={addCollab} style={{padding:"0 20px",background:"linear-gradient(135deg,#00c8ff,#A78BFA)",border:"none",borderRadius:8,color:"#000",fontFamily:"'Orbitron',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer"}}>ADD</button>

        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {collabs.map(c=>{
            const s=STATUS[c.status]||STATUS.prospect;
            return (
              <div key={c.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,overflow:"hidden"}}>

                </div>

                      <span style={{fontSize:8,color:"#00c8ff",fontFamily:"'Share Tech Mono',monospace",letterSpacing:1}}>PITCH DM</span>

                    <div style={{fontSize:10,color:"#999",fontFamily:"'Share Tech Mono',monospace",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{pitchOutput[c.id]}</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// PAGE: SPONSOR RATE CALCULATOR
// ═══════════════════════════════════════════════════════════════════════════════
function PageRateCalc({ niche }) {
  const [inputs, setInputs] = useState({platform:"youtube",followers:"",eng_rate:"",niche_type:"gaming",deal_type:"dedicated",deliverables:"1 integration"});
  const [rate, setRate] = useState(null); const [aiRate, setAiRate] = useState(""); const [loading, setLoading] = useState(false);

  const calc = () => {
    const f = Number(inputs.followers)||0;
    const eng = Number(inputs.eng_rate)||3;
    const CPM = {youtube:20,tiktok:12,instagram:15}[inputs.platform]||15;
    const mult = {dedicated:1,integration:0.6,story:0.3,ugc:0.4}[inputs.deal_type]||0.7;
    const nMult = {gaming:1.2,tech:1.1,finance:1.4,lifestyle:0.9,fitness:1.0}[inputs.niche_type]||1.0;
    const baseRate = (f/1000)*CPM*(eng/3)*mult*nMult;
    setRate(Math.round(baseRate));
  };

  const getAiRate = async () => {
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
          system:"You are a creator business expert who knows current sponsorship rates for gaming creators.",
          messages:[{role:"user",content:`What should a creator charge for brand sponsorships with these stats: Platform: ${inputs.platform}, Followers: ${inputs.followers}, Engagement rate: ${inputs.eng_rate}%, Niche: gaming (${niche||"competitive FPS"}) Deal type: ${inputs.deal_type}. Give: 1) Low/mid/high rate range, 2) What gaming brands typically pay vs lifestyle, 3) How to negotiate higher, 4) When to say no. Be specific with dollar amounts.`}]})});
      const data = await res.json();
      setAiRate(data.content?.[0]?.text||"");
    } catch(e){ setAiRate("Error"); }
    setLoading(false);
  };

  return (
    <div style={{animation:"fadeIn .25s ease"}}>
      <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:20,letterSpacing:1,marginBottom:4}}>SPONSOR RATE CALCULATOR</div>
      <div style={{fontSize:9,color:"#444",fontFamily:"'Share Tech Mono',monospace",marginBottom:18}}>Stop undercharging. Know your rate before you get on the call.</div>

      <div style={{display:"grid",gridTemplateColumns:"380px 1fr",gap:16}}>
        <div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
            {[["PLATFORM","platform","select",null,["youtube","tiktok","instagram"]],["FOLLOWERS","followers","number","e.g. 5000",null],["ENGAGEMENT RATE %","eng_rate","number","e.g. 4.2",null],["NICHE","niche_type","select",null,["gaming","tech","finance","lifestyle","fitness"]],["DEAL TYPE","deal_type","select",null,["dedicated","integration","story","ugc"]]].map(([l,k,type,ph,opts])=>(
              <div key={k}>
                <div style={LBL}>{l}</div>
                {type==="select" ? (
                  <select value={inputs[k]} onChange={e=>setInputs(i=>({...i,[k]:e.target.value}))} style={INP}>
                    {opts.map(o=><option key={o} value={o} style={{background:"#111"}}>{o}</option>)}
                  </select>
                ) : (
                  <input type={type} value={inputs[k]} onChange={e=>setInputs(i=>({...i,[k]:e.target.value}))} placeholder={ph} style={INP}/>
                )}
              </div>
            ))}
            <button onClick={calc} style={{padding:"11px",background:"linear-gradient(135deg,#F77737,#E1306C)",border:"none",borderRadius:8,color:"#fff",fontFamily:"'Orbitron',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",letterSpacing:.5}}>📊 CALCULATE MY RATE</button>
            {rate!==null && (
              <div style={{background:"rgba(0,255,136,0.06)",border:"1px solid rgba(0,255,136,0.2)",borderRadius:10,padding:"14px 18px",textAlign:"center"}}>
                <div style={{fontSize:8,color:"#00ff88",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:4}}>YOUR RATE RANGE</div>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontWeight:800,fontSize:32,color:"#00ff88"}}>${Math.round(rate*0.8).toLocaleString()} – ${Math.round(rate*1.4).toLocaleString()}</div>
                <div style={{fontSize:8,color:"#555",fontFamily:"'Share Tech Mono',monospace",marginTop:4}}>per {inputs.deal_type}</div>

  const [filter, setFilter] = useState("all");

  useEffect(()=>{ (async()=>{ try{ const r=await window.storage.get("clip-library"); if(r) setClips(JSON.parse(r.value)); }catch(_){} })(); },[]);
  const persist = (c) => { try{ window.storage.set("clip-library",JSON.stringify(c)); }catch(_){} };

  const addClip = () => {
    if(!form.title.trim()) return;
    const entry={...form,id:"clip-"+Date.now(),addedAt:new Date().toLocaleDateString()};
    const next=[entry,...clips]; setClips(next); persist(next);
    setForm({title:"",game:"Siege",type:"Clutch",quality:3,used:false,notes:"",date:""}); setAdding(false);
  };
  const toggleUsed = (id) => { const next=clips.map(c=>c.id===id?{...c,used:!c.used}:c); setClips(next); persist(next); };

  return (
