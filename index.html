<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator OS — ohPost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; }
    body { background: #0a0a0a; color: #fff; font-family: 'Share Tech Mono', monospace; }
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
    #gate {
      position:fixed; inset:0; z-index:9999; background:#0a0a0a;
      display:flex; align-items:center; justify-content:center;
    }
    .box {
      width:440px; padding:44px;
      border:1px solid rgba(167,139,250,0.3); border-radius:16px;
      background:rgba(167,139,250,0.04);
    }
    .box h1   { font-size:20px; color:#A78BFA; margin-bottom:4px; letter-spacing:3px; }
    .box .sub { font-size:10px; color:#444; margin-bottom:28px; letter-spacing:1px; }
    .box label { font-size:9px; color:#666; letter-spacing:2px; display:block; margin-bottom:8px; }
    .box input {
      width:100%; padding:12px 14px;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; color:#fff; font-family:'Share Tech Mono',monospace; font-size:12px;
      outline:none; margin-bottom:12px; transition:border .2s;
    }
    .box input:focus { border-color:rgba(167,139,250,0.5); }
    .box button {
      width:100%; padding:13px;
      background:rgba(167,139,250,0.12); border:1px solid rgba(167,139,250,0.4);
      border-radius:8px; color:#A78BFA; font-family:'Share Tech Mono',monospace;
      font-size:11px; letter-spacing:2px; cursor:pointer; transition:all .2s;
    }
    .box button:hover { background:rgba(167,139,250,0.22); }
    .box .note { font-size:9px; color:#333; margin-top:18px; line-height:1.9; text-align:center; }
    .box .note a { color:#555; text-decoration:none; }
    .box .badge {
      display:inline-block; padding:2px 8px;
      background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.2);
      border-radius:4px; color:#00ff88; font-size:8px; letter-spacing:1px; margin-left:6px;
    }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  </style>
</head>
<body>

<div id="gate">
  <div class="box">
    <h1>CREATOR OS</h1>
    <div class="sub">@ohPost · Top 500 Siege · AI Content Engine</div>
    <label>GROQ API KEY <span class="badge">FREE</span></label>
    <input type="password" id="key" placeholder="gsk_..." autocomplete="off" spellcheck="false" />
    <button id="btn">LAUNCH CREATOR OS →</button>
    <div class="note">
      Free key → <a href="https://console.groq.com" target="_blank">console.groq.com</a> (60 sec, no card)<br/>
      14,400 free requests/day · Key stays in your browser only
    </div>
  </div>
</div>

<div id="root"></div>

<script>
(function(){
  var orig = window.fetch.bind(window);
  window.fetch = function(url, opts){
    if(typeof url==='string' && url.indexOf('api.groq.com')!==-1){
      opts = opts||{};
      opts.headers = Object.assign({}, opts.headers||{}, {
        'Authorization':'Bearer '+(window.__GROQ_KEY||''),
        'Content-Type':'application/json'
      });
      if(opts.body){
        try{
          var b=JSON.parse(opts.body);
          if(b.system!==undefined && Array.isArray(b.messages)){
            b.messages=[{role:'system',content:b.system}].concat(b.messages);
            delete b.system;
          }
          opts.body=JSON.stringify(b);
        }catch(e){}
      }
    }
    return orig(url,opts);
  };
})();

function launch(){
  var key=document.getElementById('key').value.trim();
  var inp=document.getElementById('key');
  if(!key||key.length<8){
    inp.style.borderColor='#FF3A3A';
    inp.style.animation='shake .3s ease';
    setTimeout(function(){inp.style.borderColor='';inp.style.animation='';},700);
    return;
  }
  document.getElementById('gate').style.display='none';
  window.__mountApp(key);
}
document.getElementById('btn').addEventListener('click',launch);
document.getElementById('key').addEventListener('keydown',function(e){if(e.key==='Enter')launch();});
</script>
